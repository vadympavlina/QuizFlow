<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%232d5be3'/><stop offset='1' stop-color='%231a3ab8'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><rect x='7' y='9' width='12' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='9' height='2.5' rx='1.25' fill='white'/><circle cx='24' cy='22' r='5' fill='none' stroke='white' stroke-width='2.2'/><line x1='27.5' y1='25.5' x2='29.5' y2='27.5' stroke='white' stroke-width='2.2' stroke-linecap='round'/></svg>">
<title>QuizFlow — Журнал</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<link rel="modulepreload" href="shared/app.js?v=13">
<link rel="preload" as="fetch" href="shared/layout.html?v=13" crossorigin>
<link rel="modulepreload" href="shared/features.js?v=13">
</head>
<body>

<!-- MOBILE OVERLAY -->
<div id="mobile-overlay" style="display:none;position:fixed;inset:0;background:linear-gradient(160deg,#1a2b5e 0%,#0d1340 100%);z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:40px 24px">
  <div style="width:80px;height:80px;background:linear-gradient(135deg,#2d5be3,#4d78ff);border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 20px 50px rgba(45,91,227,.4)">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="3"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
  </div>
  <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:12px;max-width:320px;line-height:1.3">Мобільна версія недоступна</div>
  <div style="font-size:15px;opacity:.75;max-width:340px;line-height:1.5;margin-bottom:28px">Панель викладача оптимізована для планшетів та комп'ютерів. Відкрийте з ширшого екрану</div>
  <div style="display:inline-flex;gap:8px;background:rgba(255,255,255,.08);padding:10px 18px;border-radius:14px;backdrop-filter:blur(10px);font-size:13px;opacity:.65">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Мінімальна ширина: 1024px
  </div>
</div>

<!-- Initial loader: видимий одразу при завантаженні HTML, зникає коли сторінка готова -->
<div id="app-loader" style="position:fixed;inset:0;background:#f0f3fa;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .25s ease">
  <div style="width:44px;height:44px;border:3.5px solid rgba(45,91,227,.15);border-top-color:#2d5be3;border-radius:50%;animation:appSpin .8s linear infinite"></div>
  <div style="font-size:13px;color:#6b7280;margin-top:12px;font-family:'DM Sans',sans-serif">Завантаження...</div>
</div>
<style>@keyframes appSpin{to{transform:rotate(360deg)}}</style>

<main class="main">

  <div class="sec on" id="sec-gradebook">
    <div class="ph">
      <div><div class="pt">Журнал оцінок</div><div class="ps">Зведена відомість по студентах і тестах</div></div>
      <div class="bg" style="align-items:center;gap:8px">
        <!-- Фільтр: Тест -->
        <div class="cd-wrap" id="cd-gb-test">
          <button class="cd-btn" onclick="G.toggleDrop('cd-gb-test')">
            <span class="cd-label" id="cd-gb-test-label">Всі тести</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="cd-menu" id="cd-gb-test-menu" style="min-width:220px">
            <div class="cd-item cd-active" data-val="" onclick="G.selectGbFilter('test','','Всі тести')">Всі тести</div>
          </div>
          <select id="gb-test" style="display:none"></select>
        </div>
        <!-- Фільтр: Група -->
        <div class="cd-wrap" id="cd-gb-group">
          <button class="cd-btn" onclick="G.toggleDrop('cd-gb-group')">
            <span class="cd-label" id="cd-gb-group-label">Всі групи</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="cd-menu" id="cd-gb-group-menu">
            <div class="cd-item cd-active" data-val="" onclick="G.selectGbFilter('group','','Всі групи')">Всі групи</div>
          </div>
          <select id="gb-group" style="display:none"></select>
        </div>
        <button class="btn bs btn-sm" onclick="G.exportGradebook('csv')" style="font-size:13px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="btn bp btn-sm" onclick="G.exportGradebook('html')" style="font-size:13px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          HTML
        </button>
      </div>
    </div>
    <div id="gradebook-body">
      <div class="empty" style="padding:60px 20px"><div class="ei">📋</div><div class="et">Оберіть групу або дочекайтесь завантаження</div></div>
    </div>
  </div>


</main>

<div id="modals-root"></div>

<script type="module">
// Паралельне завантаження: features.js починає качатись одразу, не чекає initApp
// Спочатку app.js (щоб вставити window._fb і іншу базу),
// потім features.js (він читає з window._fb).
// Preload у <head> вже починає завантаження обох паралельно — тут тільки execute order.
const { initApp } = await import("./shared/app.js?v=13");
const featuresP = import("./shared/features.js?v=13");

// showSec: залишаємось на сторінці якщо це та сама; інакше — йдемо на відповідний html
window.showSec = function(name){
  if (name === "gradebook") {
    document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));
    document.getElementById("sec-gradebook")?.classList.add("on");
    return;
  }
  const sec = document.getElementById("sec-"+name);
  if (sec) {
    document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));
    sec.classList.add("on");
    return;
  }
  const pageMap = {
      dashboard:"index.html", tests:"tests.html", attempts:"attempts.html",
      links:"links.html", analytics:"analytics.html", gradebook:"gradebook.html",
      students:"students.html", notifications:"notifications.html",
      suspicious:"suspicious.html", online:"online.html", news:"news.html"
    };
  if (pageMap[name]) location.href = pageMap[name];
};

// initApp робить: sidebar load, auth, loadAllData
// Паралельно вже тягнеться features.js
await initApp("gradebook");
await featuresP;             // features.js точно готовий
await window.initFeatures(); // запускає realtime + нотифікації

if (window.renderAll) window.renderAll();

// Специфічний хук для цієї сторінки (як було в showSec оригіналу)
if (window.G?.initGradebook) try { window.G.initGradebook(); } catch {}

// Приховуємо лоадер після того як DOM реально відрендерився
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    if (window.appReady) window.appReady();
  });
});

// Esc для закриття модалок
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    document.querySelectorAll(".mo.on").forEach(m => {
      m.classList.remove("on");
      setTimeout(()=>{ if(!m.classList.contains("on")) m.style.display="none"; }, 200);
    });
  }
});
</script>
</body>
</html>
