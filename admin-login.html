<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23f43f5e'/><stop offset='1' stop-color='%23be123c'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><circle cx='13' cy='14' r='4.5' fill='none' stroke='white' stroke-width='2.2'/><path d='M16.5 14 L26 14 M22 14 L22 18 M25 14 L25 17' stroke='white' stroke-width='2.2' stroke-linecap='round'/></svg>">
<title>QuizFlow — Адмін вхід</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #f43f5e; --primary-dark: #be123c;
    --bg: #f0f3fa; --card: #fff;
    --text: #0d1340; --muted: #6b7280;
    --border: rgba(244,63,94,.15);
    --grad: linear-gradient(135deg, #f43f5e, #be123c);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, #fef2f2 0%, #fce7e7 50%, #fad3d3 100%);
    color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(244,63,94,.12), transparent 65%);
    top: -220px; right: -220px; pointer-events: none;
    animation: bgPulse 8s ease-in-out infinite;
  }
  body::after {
    content: ''; position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(190,18,60,.08), transparent 65%);
    bottom: -160px; left: -160px; pointer-events: none;
  }
  @keyframes bgPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(.97)} to{opacity:1;transform:none} }

  .card {
    background: white; border-radius: 28px;
    padding: 44px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 24px 80px rgba(190,18,60,.14), 0 2px 8px rgba(190,18,60,.06);
    position: relative; z-index: 1;
    animation: cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .shield-icon {
    width: 64px; height: 64px; margin: 0 auto 20px;
    background: var(--grad); border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 28px rgba(244,63,94,.35);
  }
  .shield-icon svg { width: 32px; height: 32px; color: white; }
  h1 {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 24px; text-align: center;
    letter-spacing: -.4px; margin-bottom: 6px;
  }
  .subtitle { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .field-group { margin-bottom: 14px; }
  .field-label {
    font-size: 11px; letter-spacing: .7px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 7px; font-weight: 600;
  }
  .field-input {
    width: 100%; padding: 14px 16px; border-radius: 13px;
    border: 2px solid rgba(244,63,94,.1);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    color: var(--text); outline: none; transition: all .2s;
    background: #fff9f9;
  }
  .field-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(244,63,94,.08); background: white;
  }
  .btn {
    width: 100%; padding: 15px;
    background: var(--grad); color: white; border: none;
    border-radius: 14px;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 15px; cursor: pointer; transition: all .2s;
    box-shadow: 0 6px 22px rgba(244,63,94,.35);
    margin-top: 8px; letter-spacing: .2px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(244,63,94,.45); }
  .btn:disabled { opacity: .6; transform: none; cursor: not-allowed; }
  .err-msg {
    background: rgba(244,63,94,.08);
    border: 1.5px solid rgba(244,63,94,.2);
    border-radius: 11px; padding: 10px 14px;
    color: #be123c; font-size: 13px; font-weight: 500;
    margin-bottom: 14px; display: none;
  }
  .err-msg.show { display: block; animation: cardIn .2s ease; }
  .back-link {
    display: block; text-align: center; margin-top: 18px;
    font-size: 13px; color: var(--muted);
    text-decoration: none; transition: color .15s;
  }
  .back-link:hover { color: var(--primary); }
  .admin-badge {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; background: rgba(244,63,94,.08);
    border: 1.5px solid rgba(244,63,94,.2);
    border-radius: 20px; font-size: 11px; font-weight: 700;
    color: var(--primary); letter-spacing: .5px;
    text-transform: uppercase; margin: 0 auto 10px;
    width: fit-content;
  }
  @media (max-width: 500px) {
    .card { padding: 32px 24px; border-radius: 22px; }
    h1 { font-size: 20px; }
    .field-input { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="shield-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
    </div>
    <div class="admin-badge">🛡 Admin Access</div>
    <h1>Адмін-панель</h1>
    <div class="subtitle">Вхід тільки для адміністраторів</div>

    <div class="err-msg" id="err"></div>

    <div class="field-group">
      <div class="field-label">Логін</div>
      <input class="field-input" type="text" id="login" autocomplete="username" placeholder="admin">
    </div>

    <div class="field-group">
      <div class="field-label">Пароль</div>
      <input class="field-input" type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Увійти</button>

    <a href="login.html" class="back-link">← Я викладач, повернутися</a>
  </div>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const cfg = {apiKey:"AIzaSyDsA4IQkn5tV41LDK43vzgm0XnRnbdgvTc",authDomain:"quizflow-8a978.firebaseapp.com",databaseURL:"https://quizflow-8a978-default-rtdb.europe-west1.firebasedatabase.app",projectId:"quizflow-8a978",storageBucket:"quizflow-8a978.firebasestorage.app",messagingSenderId:"206469794166",appId:"1:206469794166:web:55cd7007b429607acd5257"};
  const app = getApps().length ? getApps()[0] : initializeApp(cfg);
  const db = getDatabase(app);

  const errEl = document.getElementById("err");
  function showErr(msg) { errEl.textContent = msg; errEl.classList.add("show"); }
  function hideErr() { errEl.classList.remove("show"); }

  window.doLogin = async () => {
    hideErr();
    const login = document.getElementById("login").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    if (!login || !password) { showErr("Введіть логін і пароль"); return; }

    const btn = document.getElementById("loginBtn");
    btn.disabled = true; btn.textContent = "Перевірка...";

    try {
      const snap = await get(ref(db, "users"));
      if (!snap.exists()) { showErr("Користувача не знайдено"); btn.disabled=false; btn.textContent="Увійти"; return; }

      const all = snap.val();
      let found = null;
      for (const [id, u] of Object.entries(all)) {
        if (u && typeof u === "object" && u.login === login) { found = { id, ...u }; break; }
      }

      if (!found) { showErr("Невірний логін або пароль"); btn.disabled=false; btn.textContent="Увійти"; return; }
      if (found.password !== password) { showErr("Невірний логін або пароль"); btn.disabled=false; btn.textContent="Увійти"; return; }
      if (found.role !== "admin") { showErr("Доступ заборонено — тільки для адміністраторів"); btn.disabled=false; btn.textContent="Увійти"; return; }
      if (found.blocked) { showErr("Акаунт заблоковано"); btn.disabled=false; btn.textContent="Увійти"; return; }

      sessionStorage.setItem("qf_user", JSON.stringify(found));
      location.href = "admin.html";
    } catch (e) {
      showErr("Помилка: " + e.message);
      btn.disabled = false; btn.textContent = "Увійти";
    }
  };

  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });
  document.getElementById("login").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("password").focus();
  });
</script>
</body>
</html>
