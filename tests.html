<title>QuizFlow — Тести</title>

<style>
/* ═══════════════════════════════════════════════════════════════════════
   TESTS PAGE REDESIGN — scoped під #sec-tests
   Не зачіпає sidebar, модалки, інші сторінки (скоупинг через #sec-tests ...)
   ═══════════════════════════════════════════════════════════════════════ */
#sec-tests{
  --ink-900:#0B1437; --ink-700:#24335A; --ink-500:#5B6A8F; --ink-400:#8691AC;
  --line:#E3E8F2; --line-strong:#CDD6E8;
  --nav-600:#1E3A8A; --nav-accent:#3B82F6; --nav-soft:#93C5FD;
  --good:#16A34A; --warn:#F59E0B; --bad:#DC2626;
  --t-bg:#F4F6FB; --t-bg-2:#ECF0F8;
  font-family:'Manrope',system-ui,sans-serif;
  color:var(--ink-900);
}
#sec-tests.on{ display:flex; flex-direction:column; gap:20px; }

/* Page title */
#sec-tests .t-page-title{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin:0;flex-wrap:wrap}
#sec-tests .t-page-title h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin:0;color:var(--ink-900);font-family:'Manrope',sans-serif}
#sec-tests .t-page-title p{margin:4px 0 0;color:var(--ink-500);font-size:14px}
#sec-tests .t-page-chip{background:#E7EEFC;color:var(--nav-600);padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:'Geist Mono',monospace}
#sec-tests .t-page-chip::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--nav-600)}
#sec-tests .t-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Topbar buttons (override styles.css defaults only within sec-tests) */
#sec-tests .t-btn{background:#fff;border:1px solid var(--line);padding:8px 14px;border-radius:10px;font-family:'Manrope',sans-serif;font-weight:500;font-size:13px;color:var(--ink-700);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .15s;white-space:nowrap;height:36px;line-height:1}
#sec-tests .t-btn:hover{border-color:var(--line-strong);color:var(--ink-900)}
#sec-tests .t-btn.primary{background:var(--nav-600);border-color:var(--nav-600);color:#fff;box-shadow:0 6px 14px -8px rgba(30,58,138,.8)}
#sec-tests .t-btn.primary:hover{background:#1E40AF;border-color:#1E40AF;color:#fff}
#sec-tests .t-btn.ghost{background:transparent;border-color:transparent;color:var(--ink-500)}
#sec-tests .t-btn.ghost:hover{background:#EEF2FB;color:var(--ink-900)}
#sec-tests .t-btn svg{width:14px;height:14px;flex:0 0 auto}
#sec-tests .t-btn .t-mini-badge{background:var(--t-bg-2);color:var(--ink-500);padding:1px 7px;border-radius:10px;font-size:11px;margin-left:3px;font-family:'Geist Mono',monospace;font-weight:600}

/* Card (override global .card padding:20px) */
#sec-tests .t-card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;padding:0}
#sec-tests .t-card-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}

/* Breadcrumb / path nav */
#sec-tests .t-path-nav{display:flex;align-items:center;gap:6px;padding:10px 18px;background:#FAFBFE;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink-500);flex-wrap:wrap}
#sec-tests .t-path-nav .t-crumb{cursor:pointer;padding:5px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:6px;transition:all .12s;background:transparent;border:0;color:var(--ink-500);font:inherit;font-size:13px;font-family:'Manrope',sans-serif}
#sec-tests .t-path-nav .t-crumb:hover{background:#EEF2FB;color:var(--ink-900)}
#sec-tests .t-path-nav .t-crumb.active{color:var(--ink-900);font-weight:600;background:#fff;border:1px solid var(--line);cursor:default}
#sec-tests .t-path-nav .t-sep{color:var(--ink-400)}
#sec-tests .t-path-nav .t-path-right{margin-left:auto;font-size:11.5px;color:var(--ink-400);font-family:'Geist Mono',monospace}

/* Search input (inside card header) */
#sec-tests .t-search{position:relative}
#sec-tests .t-search .t-search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-400);pointer-events:none;display:flex;align-items:center}
#sec-tests .t-input,#sec-tests .t-select{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-family:'Manrope',sans-serif;font-size:13px;color:var(--ink-900);outline:none;height:34px}
#sec-tests .t-input:focus,#sec-tests .t-select:focus{border-color:var(--nav-accent)}

/* Tabs (status filter) */
#sec-tests .t-tabs{display:inline-flex;background:#F1F5FB;border-radius:8px;padding:3px;gap:2px}
#sec-tests .t-tab{font-family:'Manrope',sans-serif;font-size:12px;font-weight:600;padding:6px 11px;border-radius:6px;background:transparent;border:0;color:var(--ink-500);cursor:pointer;white-space:nowrap;transition:color .12s;display:inline-flex;align-items:center;gap:5px}
#sec-tests .t-tab:hover:not(.active){color:var(--ink-700)}
#sec-tests .t-tab.active{background:#fff;color:var(--ink-900);box-shadow:0 1px 2px rgba(0,0,0,.06)}
#sec-tests .t-tab .t-tab-n{font-family:'Geist Mono',monospace;font-size:11px;opacity:.7;font-weight:500}

/* View toggle (grid/list) */
#sec-tests .t-view{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:10px;padding:2px}
#sec-tests .t-view button{background:transparent;border:0;padding:6px 8px;border-radius:8px;color:var(--ink-500);cursor:pointer;display:grid;place-items:center;transition:all .12s}
#sec-tests .t-view button:hover:not(.on){color:var(--ink-700)}
#sec-tests .t-view button.on{background:var(--t-bg-2);color:var(--ink-900)}

/* Pills */
#sec-tests .t-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;font-size:11.5px;font-weight:600;border-radius:999px;white-space:nowrap;font-family:'Manrope',sans-serif}
#sec-tests .t-pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
#sec-tests .t-pill.on{background:#DCFCE7;color:#15803D}
#sec-tests .t-pill.draft{background:#FEF3C7;color:#92400E}
#sec-tests .t-pill.closed{background:#FEE2E2;color:#B91C1C}
#sec-tests .t-pill.info{background:#DBEAFE;color:#1E40AF}
#sec-tests .t-pill.off{background:#E5EAF5;color:var(--ink-500)}

/* Section labels inside card */
#sec-tests .t-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-400);padding:16px 18px 8px;display:flex;justify-content:space-between;align-items:baseline;font-family:'Manrope',sans-serif}
#sec-tests .t-section-label .t-n{font-family:'Geist Mono',monospace;font-weight:500;color:var(--ink-400)}

/* Mono + muted */
#sec-tests .t-mono{font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums}
#sec-tests .t-muted{color:var(--ink-400)}

/* Folder card — gradient icon with tab shape */
#sec-tests .t-folder-card{
  background:#fff; border:1px solid var(--line); border-radius:16px;
  padding:16px; display:flex; flex-direction:column; gap:12px;
  cursor:pointer; transition:border-color .15s, transform .12s, box-shadow .15s;
  position:relative; min-height:178px;
}
#sec-tests .t-folder-card:hover{border-color:var(--nav-soft);transform:translateY(-2px);box-shadow:0 10px 30px -18px rgba(30,58,138,.3)}
#sec-tests .t-fc-head{display:flex;align-items:center;gap:12px}
#sec-tests .t-fc-ico{
  width:52px; height:44px; border-radius:10px; position:relative; flex:0 0 auto;
  display:grid; place-items:center; color:#fff;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.15);
}
#sec-tests .t-fc-ico::before{
  content:""; position:absolute; top:-6px; left:8px; width:22px; height:8px;
  background:inherit; border-radius:4px 4px 0 0;
}
#sec-tests .t-fc-title{font-size:15px;font-weight:700;letter-spacing:-.005em;line-height:1.3;color:var(--ink-900)}
#sec-tests .t-fc-meta{font-size:12px;color:var(--ink-400);margin-top:3px}
#sec-tests .t-fc-meta-row{display:flex;gap:14px;font-size:12px;color:var(--ink-500);align-items:center;flex-wrap:wrap}
#sec-tests .t-fc-meta-row span{display:inline-flex;align-items:center;gap:5px}
#sec-tests .t-fc-foot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--line);gap:8px}
#sec-tests .t-fc-thumbs{display:flex;align-items:center;min-width:0}
#sec-tests .t-fc-thumb{
  width:26px; height:26px; border-radius:6px; margin-left:-6px;
  border:2px solid #fff; font-family:'Geist Mono',monospace; font-size:9px;
  display:grid; place-items:center; font-weight:700;
  flex:0 0 auto;
}
#sec-tests .t-fc-thumb:first-child{margin-left:0}
#sec-tests .t-fc-more{font-size:11px;color:var(--ink-400);margin-left:8px;align-self:center;font-family:'Geist Mono',monospace}
#sec-tests .t-fc-cta{display:inline-flex;align-items:center;gap:4px;font-weight:600;font-size:12px;white-space:nowrap}
#sec-tests .t-fc-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
#sec-tests .t-folder-card:hover .t-fc-actions{opacity:1}
#sec-tests .t-fc-actions button{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;color:var(--ink-500);transition:all .12s;padding:0}
#sec-tests .t-fc-actions button:hover{color:var(--ink-900);border-color:var(--line-strong)}
#sec-tests .t-fc-actions button.d:hover{color:#B91C1C;background:#FEE2E2;border-color:#FECACA}

/* "New folder" empty tile */
#sec-tests .t-new-folder{
  background:#FAFBFE; border:1px dashed var(--line-strong); border-radius:16px;
  padding:16px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; min-height:178px; cursor:pointer; color:var(--ink-500);
  gap:10px; transition:all .15s;
}
#sec-tests .t-new-folder:hover{border-color:var(--nav-accent);background:#F1F5FB;color:var(--nav-600)}
#sec-tests .t-new-folder .t-nf-ico{width:44px;height:44px;border-radius:12px;background:#EEF2FB;display:grid;place-items:center;color:var(--nav-600)}
#sec-tests .t-new-folder .t-nf-title{font-weight:600;font-size:13.5px;color:var(--ink-700)}
#sec-tests .t-new-folder .t-nf-hint{font-size:12px}

/* Quiz card (inside folder) */
#sec-tests .t-quiz-card{
  background:#fff; border:1px solid var(--line); border-radius:16px;
  padding:16px; display:flex; flex-direction:column; gap:12px;
  transition:border-color .15s, transform .12s, box-shadow .15s;
  position:relative;
}
#sec-tests .t-quiz-card:hover{border-color:var(--line-strong);transform:translateY(-2px);box-shadow:0 10px 30px -18px rgba(30,58,138,.2)}
#sec-tests .t-qc-cover{
  height:100px; border-radius:10px; display:flex; align-items:flex-end; padding:10px;
  position:relative; overflow:hidden; cursor:pointer;
}
#sec-tests .t-qc-cover::before{content:"";position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.2)}
#sec-tests .t-qc-cover::after{content:"";position:absolute;bottom:-14px;left:30%;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.1)}
#sec-tests .t-qc-code{font-family:'Geist Mono',monospace;font-weight:700;font-size:22px;color:rgba(255,255,255,.92);letter-spacing:-.02em;position:relative;text-shadow:0 1px 2px rgba(0,0,0,.1)}
#sec-tests .t-qc-status{position:absolute;top:10px;right:10px;z-index:1}
#sec-tests .t-qc-status .t-pill{background:rgba(255,255,255,.95);backdrop-filter:blur(4px)}
#sec-tests .t-qc-title{font-weight:700;font-size:15px;letter-spacing:-.005em;line-height:1.35;color:var(--ink-900);cursor:pointer;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:41px}
#sec-tests .t-qc-meta{display:flex;gap:12px;font-size:12px;color:var(--ink-500);margin-top:4px;flex-wrap:wrap}
#sec-tests .t-qc-meta span{display:inline-flex;align-items:center;gap:4px}
#sec-tests .t-qc-meta svg{width:12px;height:12px}
#sec-tests .t-qc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:10px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
#sec-tests .t-qc-stat-val{font-family:'Geist Mono',monospace;font-weight:700;font-size:16px;letter-spacing:-.02em;color:var(--ink-900)}
#sec-tests .t-qc-stat-lbl{font-size:10.5px;color:var(--ink-400);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:2px;font-family:'Manrope',sans-serif}
#sec-tests .t-qc-foot{display:flex;justify-content:space-between;align-items:center;gap:8px}
#sec-tests .t-qc-date{font-size:12px;color:var(--ink-400)}
#sec-tests .t-qc-foot-actions{display:flex;gap:6px}
#sec-tests .t-menu-btn{background:transparent;border:1px solid var(--line);color:var(--ink-500);cursor:pointer;padding:5px 7px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;transition:all .12s}
#sec-tests .t-menu-btn:hover{background:#F1F5FB;color:var(--ink-900);border-color:var(--line-strong)}
#sec-tests .t-edit-btn{display:inline-flex;align-items:center;gap:5px;padding:0 11px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink-700);transition:all .12s}
#sec-tests .t-edit-btn:hover{border-color:var(--nav-accent);color:var(--nav-600)}
#sec-tests .t-edit-btn svg{width:12px;height:12px}

/* Popup menu for test card — контролюється через inline style.display з G._toggleTestMenu */
#sec-tests .t-tmenu{display:none;position:absolute;bottom:calc(100% + 4px);right:0;min-width:180px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(11,20,55,.12);z-index:150;overflow:hidden}
#sec-tests .t-tmenu-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--ink-700);transition:background .12s;font-family:'Manrope',sans-serif}
#sec-tests .t-tmenu-item:hover{background:#F1F5FB;color:var(--ink-900)}
#sec-tests .t-tmenu-item svg{width:13px;height:13px;flex:0 0 auto}
#sec-tests .t-tmenu-item.d{color:#B91C1C}
#sec-tests .t-tmenu-item.d:hover{background:#FEE2E2}
#sec-tests .t-tmenu-sep{height:1px;background:var(--line);margin:2px 0}

/* List view table */
#sec-tests .t-dtable{width:100%;border-collapse:separate;border-spacing:0}
#sec-tests .t-dtable th,#sec-tests .t-dtable td{padding:12px 18px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);font-family:'Manrope',sans-serif}
#sec-tests .t-dtable th{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-400);background:#FAFBFE;user-select:none}
#sec-tests .t-dtable tbody tr{transition:background .12s}
#sec-tests .t-dtable tbody tr:last-child td{border-bottom:0}
#sec-tests .t-dtable tbody tr:hover{background:#FAFBFE}
#sec-tests .t-tile{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-family:'Geist Mono',monospace;font-weight:800;font-size:11px;color:rgba(255,255,255,.95);letter-spacing:-.02em;position:relative;overflow:hidden;flex:0 0 auto}
#sec-tests .t-tile::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(255,255,255,.25),transparent 60%)}
#sec-tests .t-ra{display:flex;gap:4px;opacity:0;transition:opacity .15s;justify-content:flex-end}
#sec-tests .t-dtable tbody tr:hover .t-ra{opacity:1}
#sec-tests .t-ib{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--ink-500);cursor:pointer;transition:all .12s;padding:0}
#sec-tests .t-ib:hover{background:#F1F5FB;color:var(--ink-900);border-color:var(--line)}
#sec-tests .t-ib.d:hover{background:#FEE2E2;color:#B91C1C;border-color:#FECACA}
#sec-tests .t-ib svg{width:13px;height:13px}

/* Empty states */
#sec-tests .t-empty{padding:56px 24px;text-align:center;color:var(--ink-500)}
#sec-tests .t-empty .t-empty-ico{width:56px;height:56px;margin:0 auto 14px;border-radius:14px;background:#EEF2FB;display:grid;place-items:center;color:var(--nav-600)}
#sec-tests .t-empty .t-empty-title{font-size:15px;font-weight:700;color:var(--ink-900);margin-bottom:4px;font-family:'Manrope',sans-serif}
#sec-tests .t-empty .t-empty-hint{font-size:13px;margin-bottom:18px}

/* Responsive */
@media (max-width:1200px){
  #sec-tests .t-folders-grid{grid-template-columns:repeat(2,1fr)!important}
  #sec-tests .t-quizzes-grid{grid-template-columns:repeat(2,1fr)!important}
}
@media (max-width:820px){
  #sec-tests .t-folders-grid{grid-template-columns:1fr!important}
  #sec-tests .t-quizzes-grid{grid-template-columns:1fr!important}
}
</style>
</head>
<body>

<!-- MOBILE OVERLAY -->
<div id="mobile-overlay" style="display:none;position:fixed;inset:0;background:linear-gradient(160deg,#1a2b5e 0%,#0d1340 100%);z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:40px 24px">
  <div style="width:80px;height:80px;background:linear-gradient(135deg,#2d5be3,#4d78ff);border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 20px 50px rgba(45,91,227,.4)">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="3"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
  </div>
  <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:12px;max-width:320px;line-height:1.3">Мобільна версія недоступна</div>
  <div style="font-size:15px;opacity:.75;max-width:340px;line-height:1.5;margin-bottom:28px">Панель викладача оптимізована для планшетів та комп'ютерів. Відкрийте з ширшого екрану</div>
  <div style="display:inline-flex;gap:8px;background:rgba(255,255,255,.08);padding:10px 18px;border-radius:14px;backdrop-filter:blur(10px);font-size:13px;opacity:.65">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    Мінімальна ширина: 1024px
  </div>
</div>

<!-- Initial loader -->
<div id="app-loader" style="position:fixed;inset:0;background:#f0f3fa;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .25s ease">
  <div style="width:44px;height:44px;border:3.5px solid rgba(45,91,227,.15);border-top-color:#2d5be3;border-radius:50%;animation:appSpin .8s linear infinite"></div>
  <div style="font-size:13px;color:#6b7280;margin-top:12px;font-family:'DM Sans',sans-serif">Завантаження...</div>
</div>
<style>@keyframes appSpin{to{transform:rotate(360deg)}}</style>

<main class="main">

  <!-- TESTS (новий дизайн) -->
  <div class="sec on" id="sec-tests">

    <!-- Заголовок сторінки + CTA -->
    <div class="t-page-title">
      <div>
        <h1>Тести</h1>
        <p id="t-subtitle">Папки та тести · організуйте свої матеріали</p>
      </div>
      <div class="t-actions">
        <button class="t-btn ghost" onclick="showSec('archive')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="5" rx="2"/><path d="M4 9v9a2 2 0 002 2h12a2 2 0 002-2V9"/><line x1="10" y1="13" x2="14" y2="13"/></svg>
          Архів <span class="t-mini-badge" id="nb-archive">0</span>
        </button>
        <button class="t-btn" onclick="openM('m-folder')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/><path d="M12 11v6M9 14h6"/></svg>
          Нова папка
        </button>
        <button class="t-btn primary" onclick="openM('m-test')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Новий тест
        </button>
      </div>
    </div>

    <!-- Контейнер — сюди renderTests() рендерить все (card, breadcrumb, toolbar, content) -->
    <div id="tc"></div>

  </div>

  <!-- ARCHIVE (залишаю оригінальну структуру — окрема задача на redesign) -->
  <div class="sec" id="sec-archive">
    <div class="ph">
      <div>
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="showSec('tests')" style="display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:10px;border:1.5px solid var(--border);background:white;font-size:13px;cursor:pointer;color:var(--muted)"
            onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'"
            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Тести
          </button>
          <div class="pt">Архів тестів</div>
        </div>
        <div class="ps">Завершені та неактивні тести</div>
      </div>
    </div>
    <div id="archive-body">
      <div class="empty" style="padding:60px 20px"><div class="ei">📦</div><div class="et">Архів порожній</div></div>
    </div>
  </div>

</main>

<div id="modals-root"></div>

<script type="module">
// ─── Ініціалізація (паралельне завантаження — як в оригіналі) ───
const { initApp } = await import("./shared/app.js?v=14");
const featuresP = import("./shared/features.js?v=14");

window.showSec = function(name){
  if (name === "tests"){
    document.querySelectorAll(".sec").forEach(s => s.classList.remove("on"));
    document.getElementById("sec-tests")?.classList.add("on");
    return;
  }
  if (name === "archive"){
    document.querySelectorAll(".sec").forEach(s => s.classList.remove("on"));
    document.getElementById("sec-archive")?.classList.add("on");
    if (window.G?.renderArchive) try { window.G.renderArchive(); } catch(e){}
    return;
  }
  const sec = document.getElementById("sec-" + name);
  if (sec){
    document.querySelectorAll(".sec").forEach(s => s.classList.remove("on"));
    sec.classList.add("on");
    return;
  }
  const pageMap = {
    dashboard:"index.html", tests:"tests.html", attempts:"attempts.html",
    links:"links.html", analytics:"analytics.html", gradebook:"gradebook.html",
    students:"students.html", notifications:"notifications.html",
    suspicious:"suspicious.html", online:"online.html", news:"news.html"
  };
  if (pageMap[name]) location.href = pageMap[name];
};

await initApp("tests");
await featuresP;
await window.initFeatures();

if (window.renderAll) window.renderAll();

requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    if (window.appReady) window.appReady();
  });
});

// Esc — закриття модалок + popup-меню тестів
document.addEventListener("keydown", e => {
  if (e.key === "Escape"){
    document.querySelectorAll(".mo.on").forEach(m => {
      m.classList.remove("on");
      setTimeout(() => { if (!m.classList.contains("on")) m.style.display = "none"; }, 200);
    });
    document.querySelectorAll(".t-tmenu").forEach(m => {
      if (m.style.display === "block") m.style.display = "none";
    });
  }
});
</script>
</body>
</html>
