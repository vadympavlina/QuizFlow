<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%232d5be3'/><stop offset='1' stop-color='%231a3ab8'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><rect x='7' y='9' width='12' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='9' height='2.5' rx='1.25' fill='white'/><circle cx='24' cy='22' r='5' fill='none' stroke='white' stroke-width='2.2'/><line x1='27.5' y1='25.5' x2='29.5' y2='27.5' stroke='white' stroke-width='2.2' stroke-linecap='round'/></svg>">
<title>404 — Сторінку не знайдено · QuizFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f3fa;
  --primary:#2d5be3;
  --primary-d:#1a3ab8;
  --text:#0d1340;
  --muted:#6b7280;
  --card:#fff;
  --border:rgba(45,91,227,0.08);
  --grad:linear-gradient(135deg,#2d5be3,#1a3ab8);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  background:linear-gradient(160deg,#eaf0fd 0%,#f0f3fa 45%,#e8eefc 100%);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* Фонові кола */
body::before {
  content:'';
  position:fixed;
  width:900px; height:900px;
  background:radial-gradient(circle,rgba(45,91,227,.12),transparent 65%);
  top:-300px; right:-300px;
  pointer-events:none; z-index:0;
  animation:bgMove 20s ease-in-out infinite;
}
body::after {
  content:'';
  position:fixed;
  width:700px; height:700px;
  background:radial-gradient(circle,rgba(147,51,234,.08),transparent 60%);
  bottom:-250px; left:-200px;
  pointer-events:none; z-index:0;
  animation:bgMove 25s ease-in-out infinite reverse;
}
@keyframes bgMove {
  0%,100% { transform:translate(0,0) scale(1); }
  50% { transform:translate(50px,30px) scale(1.08); }
}

.wrap {
  position:relative;
  z-index:1;
  max-width:560px;
  width:100%;
  text-align:center;
  animation:fadeIn .5s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

/* Лого */
.logo {
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-bottom:48px;
  text-decoration:none;
  color:var(--text);
}
.logo-i {
  width:40px; height:40px;
  background:var(--grad);
  border-radius:11px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:17px;
  color:#fff;
  box-shadow:0 4px 14px rgba(45,91,227,.3);
}
.logo-t {
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:19px;
  letter-spacing:-.3px;
}

/* Величезна 404 */
.big-404 {
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:180px;
  line-height:.9;
  letter-spacing:-6px;
  background:var(--grad);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:8px;
  position:relative;
  animation:numberIn .8s cubic-bezier(.34,1.56,.64,1);
}
@keyframes numberIn {
  from { opacity:0; transform:scale(.85); letter-spacing:0; }
  to   { opacity:1; transform:scale(1); letter-spacing:-6px; }
}

.title {
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:30px;
  letter-spacing:-.6px;
  margin-bottom:14px;
}

.subtitle {
  font-size:16px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:36px;
  max-width:440px;
  margin-left:auto;
  margin-right:auto;
}

.actions {
  display:inline-flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:13px 22px;
  border-radius:13px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  border:none;
  text-decoration:none;
}
.bp {
  background:var(--grad);
  color:#fff;
  box-shadow:0 6px 22px rgba(45,91,227,.3);
}
.bp:hover {
  transform:translateY(-2px);
  box-shadow:0 10px 28px rgba(45,91,227,.4);
}
.bs {
  background:#fff;
  color:var(--text);
  border:1.5px solid var(--border);
}
.bs:hover {
  border-color:var(--primary);
  color:var(--primary);
  transform:translateY(-1px);
}

/* Маленький лабель помилки */
.err-tag {
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:6px 14px;
  background:rgba(244,63,94,.08);
  border:1.5px solid rgba(244,63,94,.18);
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  color:#be123c;
  letter-spacing:.8px;
  text-transform:uppercase;
  margin-bottom:32px;
}
.err-tag-dot {
  width:6px; height:6px;
  border-radius:50%;
  background:#be123c;
  animation:pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Моб */
@media (max-width:600px) {
  .big-404 { font-size:120px; letter-spacing:-4px; }
  .title { font-size:22px; }
  .subtitle { font-size:14px; }
  .btn { padding:12px 18px; font-size:14px; }
  .logo { margin-bottom:32px; }
  .err-tag { margin-bottom:24px; padding:5px 12px; font-size:11px; }
}
@media (max-width:400px) {
  .big-404 { font-size:96px; }
  .actions { flex-direction:column; width:100%; }
  .btn { width:100%; justify-content:center; }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="big-404">404</div>

  <h1 class="title">Сторінку не знайдено</h1>
  <p class="subtitle">
    Здається, ми не можемо знайти цю сторінку. Можливо, вона була переміщена, видалена або ви ввели неправильну адресу.
  </p>

  <div class="actions">
    <a href="javascript:history.back()" class="btn bs">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Повернутись назад
    </a>
  </div>
</div>

</body>
</html>
