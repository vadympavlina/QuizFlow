<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%232d5be3'/><stop offset='1' stop-color='%231a3ab8'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><circle cx='16' cy='16' r='5' fill='white'/><circle cx='16' cy='16' r='9' fill='none' stroke='white' stroke-width='2' opacity='.5'/></svg>">
<title>QuizFlow — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2d5be3;
  --primary-d: #1a3ab8;
  --teal: #0d9e85;
  --amber: #f59e0b;
  --purple: #9333ea;
  --rose: #f43f5e;
  --text: #0d1340;
  --muted: #6b7280;
  --border: #e5e8f0;
  --card: #fff;
  --bg: #f0f3fa;
  --grad: linear-gradient(135deg, #2d5be3, #1a3ab8);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  background: linear-gradient(160deg, #eaf0fd 0%, #f0f3fa 45%, #e8eefc 100%);
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  width: 900px; height: 900px;
  background: radial-gradient(circle, rgba(45,91,227,.10), transparent 65%);
  top: -300px; right: -300px;
  pointer-events: none; z-index: 0;
  animation: bgMove 20s ease-in-out infinite;
}
body::after {
  content: '';
  position: fixed;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(147,51,234,.07), transparent 60%);
  bottom: -250px; left: -200px;
  pointer-events: none; z-index: 0;
  animation: bgMove 25s ease-in-out infinite reverse;
}
@keyframes bgMove {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(50px,30px) scale(1.08); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(.96); } to { opacity: 1; transform: none; } }
@keyframes cardOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(.94) translateY(-8px); } }
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
@keyframes pulseRing {
  0% { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
  70% { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}

/* ── Шапка ── */
.top {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(240,243,250,.75);
  border-bottom: 1px solid rgba(45,91,227,.1);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}
.top-left {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.top-logo {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: var(--grad);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 6px 22px rgba(45,91,227,.4);
}
.top-info { min-width: 0; }
.top-title {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -.4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(220,38,38,.1);
  border: 1.5px solid rgba(220,38,38,.25);
  border-radius: 14px;
  font-size: 10px;
  font-weight: 800;
  color: #dc2626;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #dc2626;
  animation: pulse 1.5s infinite;
}
.top-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.top-right {
  display: flex;
  align-items: center;
  gap: 18px;
}
.top-stat {
  text-align: center;
  padding: 4px 14px;
  border-left: 1.5px solid var(--border);
  min-width: 58px;
}
.top-stat:first-child { border-left: none; padding-left: 0; }
.top-stat-n {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 26px;
  line-height: 1;
  color: var(--primary);
  font-variant-numeric: tabular-nums;
}
.top-stat-n.green { color: var(--teal); }
.top-stat-n.amber { color: var(--amber); }
.top-stat-l {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-top: 4px;
  font-weight: 600;
}
.top-clock {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 18px;
  font-variant-numeric: tabular-nums;
  padding: 8px 14px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
}
.back-btn {
  width: 40px; height: 40px;
  border-radius: 11px;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all .15s;
  flex-shrink: 0;
  text-decoration: none;
}
.back-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Main ── */
main {
  padding: 28px 32px 40px;
  position: relative;
  z-index: 1;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
}
.section-title {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-count {
  padding: 4px 12px;
  background: rgba(45,91,227,.08);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
}
.section-count.green { background: rgba(13,158,133,.1); color: var(--teal); }
.section-count.amber { background: rgba(245,158,11,.1); color: #b45309; }

/* Grid */
.live-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

/* ── Student card ── */
.student-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 2px 12px rgba(10,14,46,.05), 0 1px 3px rgba(10,14,46,.04);
  position: relative;
  overflow: hidden;
  transition: box-shadow .22s, border-color .22s, transform .22s;
  will-change: transform;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.student-card.new-card {
  animation: cardIn .38s cubic-bezier(.34,1.56,.64,1) both;
}
.student-card:hover {
  box-shadow: 0 8px 28px rgba(45,91,227,.11), 0 2px 6px rgba(45,91,227,.06);
  border-color: rgba(45,91,227,.2);
  transform: translateY(-2px);
}
.student-card.removing {
  animation: cardOut .28s ease forwards;
  pointer-events: none;
}

/* Кольорова смужка зліва */
.student-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--grad);
  border-radius: 18px 0 0 18px;
}
.student-card.idle::before { background: linear-gradient(180deg, #f59e0b, #c2410c); }
.student-card.finished::before { background: linear-gradient(180deg, #0d9e85, #047857); }

/* ── Верхня частина: аватар + ім'я + статус ── */
.card-head {
  display: flex;
  align-items: center;
  gap: 10px;
}
.ava {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--grad);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: .3px;
  flex-shrink: 0;
  position: relative;
}
.ava.active::after {
  content: '';
  position: absolute;
  bottom: -3px; right: -3px;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #22c55e;
  border: 2px solid var(--card);
  animation: pulseRing 2s infinite;
}
.ava.idle::after {
  content: '';
  position: absolute;
  bottom: -3px; right: -3px;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #f59e0b;
  border: 2px solid var(--card);
}
.ava.finished { background: linear-gradient(135deg, #0d9e85, #047857); }

.who { flex: 1; min-width: 0; }
.who-name {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 14px;
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
}
.who-test {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Прогрес ── */
.progress-block { display: flex; flex-direction: column; gap: 6px; }
.progress-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.progress-q {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: var(--primary);
  line-height: 1;
  display: flex;
  align-items: baseline;
  gap: 1px;
}
.progress-q sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  vertical-align: baseline;
  margin-left: 1px;
}
.progress-pct {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 8px;
}
.progress-bar {
  height: 5px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 4px;
  transition: width .5s cubic-bezier(.34,1.56,.64,1);
}
.progress-fill.idle { background: linear-gradient(90deg, #f59e0b, #c2410c); }
.progress-fill.finished { background: linear-gradient(90deg, #0d9e85, #047857); }

/* ── Нижня смужка: час + бейдж ── */
.meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 11px;
  color: var(--muted);
}
.meta-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.meta-item svg { flex-shrink: 0; opacity: .65; }
.bdg {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2px;
}
.bdg-g { background: rgba(13,158,133,.1); color: var(--teal); }
.bdg-a { background: rgba(245,158,11,.1); color: #b45309; }
.bdg-r { background: rgba(220,38,38,.08); color: #be123c; }

/* Empty */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
}
.empty-icon {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  border-radius: 22px;
  background: var(--grad);
  opacity: .3;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.empty-icon svg { width: 40px; height: 40px; }
.empty-title {
  font-family: 'DM Sans', sans-serif;
  font-weight: 700;
  font-size: 22px;
  margin-bottom: 8px;
}
.empty-text { font-size: 14px; color: var(--muted); }

#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  transition: opacity .4s ease;
}
#loader.hiding { opacity: 0; pointer-events: none; }
.spin {
  width: 44px;
  height: 44px;
  border: 3px solid rgba(45,91,227,.12);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  box-shadow: 0 0 20px rgba(45,91,227,.15);
}

/* Grade (for finished) */
.grade-big {
  font-family: 'DM Sans', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: var(--teal);
  line-height: 1;
  text-align: center;
  padding: 6px 0 2px;
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 4px;
}
.grade-big small {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
}

/* ═══════ ADAPTATION ═══════ */

/* Great TV 4K — more columns, larger */
@media (min-width: 1800px) {
  main { padding: 40px 56px 56px; }
  .live-grid {
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .top { padding: 22px 56px; }
  .top-logo { width: 56px; height: 56px; font-size: 26px; }
  .top-title { font-size: 28px; }
  .top-stat-n { font-size: 32px; }
  .section-title { font-size: 24px; }
  .student-card { padding: 18px; border-radius: 20px; }
  .who-name { font-size: 15px; }
  .progress-q { font-size: 22px; }
}
@media (min-width: 2400px) {
  .live-grid {
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }
  .top-title { font-size: 32px; }
  .student-card { padding: 22px; }
  .who-name { font-size: 17px; }
  .progress-q { font-size: 26px; }
}

/* Tablet */
@media (max-width: 1000px) {
  .top { padding: 14px 20px; flex-wrap: wrap; }
  main { padding: 20px; }
  .live-grid {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .student-card { padding: 14px; border-radius: 16px; }
  .top-stat { padding: 4px 10px; min-width: 50px; }
  .top-stat-n { font-size: 22px; }
}

/* Phone */
@media (max-width: 700px) {
  .top {
    flex-wrap: wrap;
    padding: 12px 16px;
    gap: 12px;
  }
  .top-left { gap: 10px; }
  .top-logo { width: 40px; height: 40px; font-size: 18px; border-radius: 12px; }
  .top-title { font-size: 18px; }
  .top-sub { font-size: 11px; }
  .live-badge { padding: 3px 9px; font-size: 9px; }
  .top-right {
    width: 100%;
    justify-content: space-between;
    gap: 8px;
  }
  .top-stat { flex: 1; padding: 2px 6px; border-left: 1px solid var(--border); min-width: 0; }
  .top-stat:first-child { padding-left: 0; }
  .top-stat-n { font-size: 18px; }
  .top-stat-l { font-size: 9px; }
  .top-clock { display: none; }
  main { padding: 14px; }
  .live-grid {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .student-card { padding: 12px; border-radius: 14px; gap: 10px; }
  .ava { width: 34px; height: 34px; font-size: 11px; border-radius: 10px; }
  .who-name { font-size: 13px; }
  .who-test { font-size: 10px; }
  .progress-q { font-size: 18px; }
  .progress-q sub { font-size: 10px; }
  .progress-pct { font-size: 11px; }
  .meta-row { font-size: 10px; }
  .meta-item svg { width: 10px; height: 10px; }
  .section-title { font-size: 16px; }
  .section-count { font-size: 11px; padding: 3px 9px; }
  .grade-big { font-size: 22px; }
  .back-btn { width: 36px; height: 36px; }
}

@media (max-width: 440px) {
  .live-grid { grid-template-columns: 1fr; }
  .top-title { font-size: 16px; }
  .card-head { gap: 8px; }
}
</style>
</head>
<body>
  <div id="loader">
    <div class="spin"></div>
    <div style="font-size:14px;color:var(--muted)">Завантаження...</div>
  </div>

  <header class="top">
    <div class="top-left">
      <div class="top-logo">Q</div>
      <div class="top-info">
        <div class="top-title">
          <span>Live</span>
          <span class="live-badge"><span class="live-dot"></span>Online</span>
        </div>
        <div class="top-sub" id="teacher-name">—</div>
      </div>
    </div>
    <div class="top-right">
      <div class="top-stat">
        <div class="top-stat-n green" id="stat-active">0</div>
        <div class="top-stat-l">Проходять зараз</div>
      </div>
      <div class="top-clock" id="clock">—:—:—</div>
    </div>
  </header>

  <main>
    <div class="live-grid" id="grid-active"></div>

    <!-- Empty -->
    <div class="empty" id="empty-state" style="display:none">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </div>
      <div class="empty-title">Зараз ніхто не проходить тест</div>
      <div class="empty-text">Коли студенти почнуть виконувати завдання — вони з'являться тут автоматично</div>
    </div>
  </main>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {apiKey:"AIzaSyDsA4IQkn5tV41LDK43vzgm0XnRnbdgvTc",authDomain:"quizflow-8a978.firebaseapp.com",databaseURL:"https://quizflow-8a978-default-rtdb.europe-west1.firebasedatabase.app",projectId:"quizflow-8a978",storageBucket:"quizflow-8a978.firebasestorage.app",messagingSenderId:"206469794166",appId:"1:206469794166:web:55cd7007b429607acd5257"};
const app = getApps().length ? getApps()[0] : initializeApp(cfg);
const db  = getDatabase(app);

// ─── Auth ──────────────────────────────────────────────────────────────────
const sess = sessionStorage.getItem("qf_user");
if(!sess){ location.href = "login.html"; throw ""; }
const _user = JSON.parse(sess);
if(!_user || !_user.id){ location.href = "login.html"; throw ""; }

const _tuid = _user.id;
document.getElementById("teacher-name").textContent = _user.name || _user.login;

// ─── Helpers ───────────────────────────────────────────────────────────────
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function formatTimeAgo(ts){
  const diff = Date.now() - ts;
  const secs = Math.floor(diff / 1000);
  if(secs < 60) return "щойно";
  const mins = Math.floor(secs / 60);
  if(mins < 60) return mins + " хв";
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + " год";
  return new Date(ts).toLocaleDateString("uk-UA",{day:"numeric",month:"short"});
}

function formatDuration(ms){
  const secs = Math.floor(ms / 1000);
  const mins = Math.floor(secs / 60);
  const s = secs % 60;
  return mins + ":" + String(s).padStart(2,"0");
}

function initials(name){
  return (name||"?").split(/\s+/).map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
}

// ─── Clock ─────────────────────────────────────────────────────────────────
function updateClock(){
  const d = new Date();
  const h = String(d.getHours()).padStart(2,"0");
  const m = String(d.getMinutes()).padStart(2,"0");
  const s = String(d.getSeconds()).padStart(2,"0");
  document.getElementById("clock").textContent = `${h}:${m}:${s}`;
}
updateClock();
setInterval(updateClock, 1000);

// ─── Load tests (для назв) ─────────────────────────────────────────────────
let _tests = {};
async function loadTests(){
  const snap = await get(ref(db, `teachers/${_tuid}/tests`));
  if(snap.exists()) _tests = snap.val();
}

// ─── Render card ───────────────────────────────────────────────────────────
function studentCard(a, state){
  const name = (a.name || "") + " " + (a.surname || "");
  const display = name.trim() || "Студент";
  const testTitle = _tests[a.testId]?.title || "Тест";
  const totalQ = a.totalQ || _tests[a.testId]?.questions?.length || 0;
  const currentQ = a.currentQ || 0;
  const pct = totalQ > 0 ? Math.round((currentQ / totalQ) * 100) : 0;
  const duration = a.startedAt ? Date.now() - a.startedAt : 0;

  if(state === "finished"){
    const grade = a.grade12;
    return `<div class="student-card finished">
      <div class="card-head">
        <div class="ava finished">${initials(display)}</div>
        <div class="who">
          <div class="who-name">${esc(display)}</div>
          <div class="who-test">${esc(testTitle)}</div>
        </div>
        <span class="bdg bdg-g">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          Завершено
        </span>
      </div>
      <div class="grade-big">${grade != null ? grade : "—"}<small>з 12</small></div>
      <div class="meta-row">
        <span class="meta-item">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${a.finishedAt ? formatTimeAgo(a.finishedAt) + " тому" : "—"}
        </span>
      </div>
    </div>`;
  }

  const cls = state === "idle" ? " idle" : "";
  const avaCls = state === "idle" ? "idle" : "active";
  const fillCls = state === "idle" ? "idle" : "";
  const badge = state === "idle"
    ? `<span class="bdg bdg-a">Неактивний</span>`
    : `<span class="bdg bdg-g">Активний</span>`;

  return `<div class="student-card${cls}">
    <div class="card-head">
      <div class="ava ${avaCls}">${initials(display)}</div>
      <div class="who">
        <div class="who-name">${esc(display)}</div>
        <div class="who-test">${esc(testTitle)}</div>
      </div>
      ${badge}
    </div>
    <div class="progress-block">
      <div class="progress-row">
        <div class="progress-q">${currentQ}<sub>/${totalQ || "?"}</sub></div>
        <div class="progress-pct">${pct}%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill ${fillCls}" style="width:${pct}%"></div></div>
    </div>
    <div class="meta-row">
      <span class="meta-item">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${formatDuration(duration)}
      </span>
    </div>
  </div>`;
}

// ─── Кеш стану карток (для порівняння змін) ───────────────────────────────
const _cardState = new Map(); // id → { currentQ, pct, isIdle, startedAt }

// ─── Render: тільки структурні зміни (додати/видалити картку) ─────────────
function render(attempts){
  const active = [];
  Object.entries(attempts || {}).forEach(([id, a]) => {
    if(!a) return;
    if(a.status === "in_progress" && !a.finishedAt){
      active.push({id, ...a});
    }
  });

  active.sort((a,b) => (b.currentQ || 0) - (a.currentQ || 0) || (a.startedAt||0) - (b.startedAt||0));

  document.getElementById("stat-active").textContent = active.length;

  const grid = document.getElementById("grid-active");

  // Поточні картки в DOM
  const existing = new Map();
  grid.querySelectorAll(".student-card[data-id]").forEach(el => {
    existing.set(el.dataset.id, el);
  });

  // Видаляємо зниклих — плавно
  const newIds = new Set(active.map(a => a.id));
  existing.forEach((el, id) => {
    if(!newIds.has(id)){
      _cardState.delete(id);
      el.classList.add("removing");
      // fallback якщо animationend не спрацює
      const t = setTimeout(() => el.remove(), 400);
      el.addEventListener("animationend", () => { clearTimeout(t); el.remove(); }, { once: true });
    }
  });

  // Додаємо нових / оновлюємо існуючих
  active.forEach((a, idx) => {
    if(existing.has(a.id)){
      // Картка вже є — лише патчимо дані, БЕЗ будь-яких DOM-переміщень
      patchCardData(existing.get(a.id), a);
    } else {
      // Нова картка — створюємо і вставляємо
      const html = studentCard(a, "active");
      const tmp = document.createElement("div");
      tmp.innerHTML = html.trim();
      const el = tmp.firstElementChild;
      el.dataset.id = a.id;
      el.classList.add("new-card");
      el.style.animationDelay = (idx * 35) + "ms";
      el.addEventListener("animationend", () => el.classList.remove("new-card"), { once: true });
      // Зберігаємо початковий стан
      _cardState.set(a.id, {
        currentQ: a.currentQ || 0,
        pct: calcPct(a),
        isIdle: false,
        startedAt: a.startedAt || 0
      });
      grid.appendChild(el);
    }
  });

  document.getElementById("empty-state").style.display = active.length === 0 ? "block" : "none";
}

function calcPct(a){
  const totalQ = a.totalQ || _tests[a.testId]?.questions?.length || 0;
  return totalQ > 0 ? Math.round(((a.currentQ || 0) / totalQ) * 100) : 0;
}

// ─── patchCardData: хірургічно оновлює тільки поля що змінились ───────────
function patchCardData(el, a){
  const prev = _cardState.get(a.id) || {};
  const currentQ = a.currentQ || 0;
  const pct = calcPct(a);
  const isIdle = false; // в active-render всі active

  // Питання + відсоток
  if(prev.currentQ !== currentQ || prev.pct !== pct){
    const qEl = el.querySelector(".progress-q");
    const totalQ = a.totalQ || _tests[a.testId]?.questions?.length || 0;
    if(qEl) qEl.innerHTML = `${currentQ}<sub>/${totalQ || "?"}</sub>`;

    const pctEl = el.querySelector(".progress-pct");
    if(pctEl) pctEl.textContent = pct + "%";

    const fill = el.querySelector(".progress-fill");
    if(fill) fill.style.width = pct + "%";
  }

  // idle статус
  if(prev.isIdle !== isIdle){
    el.classList.toggle("idle", isIdle);
    const fill = el.querySelector(".progress-fill");
    if(fill) fill.classList.toggle("idle", isIdle);
    const ava = el.querySelector(".ava");
    if(ava){ ava.className = "ava " + (isIdle ? "idle" : "active"); }
  }

  _cardState.set(a.id, { currentQ, pct, isIdle, startedAt: a.startedAt || 0 });
}

// ─── Окремий таймер ТІЛЬКИ для тривалості — не торкається нічого іншого ───
let _lastAttempts = {};
setInterval(() => {
  const grid = document.getElementById("grid-active");
  grid.querySelectorAll(".student-card[data-id]").forEach(el => {
    const id = el.dataset.id;
    const a = _lastAttempts[id];
    if(!a || !a.startedAt) return;
    const dur = el.querySelector(".meta-item");
    if(dur){
      const txt = formatDuration(Date.now() - a.startedAt);
      // Оновлюємо лише текстовий вузол, не торкаємось SVG
      const nodes = dur.childNodes;
      for(let i = 0; i < nodes.length; i++){
        if(nodes[i].nodeType === 3 && nodes[i].textContent.trim()){
          nodes[i].textContent = "\n        " + txt + "\n      ";
          break;
        }
      }
    }
  });
}, 1000);

// ─── Init ──────────────────────────────────────────────────────────────────
(async () => {
  await loadTests();

  // Real-time підписка на зміни спроб викладача
  onValue(ref(db, `teachers/${_tuid}/attempts`), (snap) => {
    _lastAttempts = snap.val() || {};
    render(_lastAttempts);
    const loader = document.getElementById("loader");
    loader.classList.add("hiding");
    setTimeout(() => loader.style.display = "none", 400);
  }, (err) => {
    console.error("Live subscription error:", err);
    const loader = document.getElementById("loader");
    loader.classList.add("hiding");
    setTimeout(() => loader.style.display = "none", 400);
  });
})();
</script>
</body>
