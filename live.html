<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%232d5be3'/><stop offset='1' stop-color='%231a3ab8'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><circle cx='16' cy='16' r='5' fill='white'/><circle cx='16' cy='16' r='9' fill='none' stroke='white' stroke-width='2' opacity='.5'/></svg>">
<title>QuizFlow — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f3fa;--sidebar:#0a0f2e;--primary:#2d5be3;--primary-light:#4d78ff;--glow:rgba(45,91,227,0.15);--teal:#14d4b4;--amber:#f59e0b;--rose:#f43f5e;--card:#fff;--border:rgba(45,91,227,0.08);--text:#0d1340;--muted:#6b7280;--light:#a0a8c0;--grad:linear-gradient(135deg,#2d5be3,#1a3ab8)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(20,212,180,.55)}70%{box-shadow:0 0 0 12px rgba(20,212,180,0)}100%{box-shadow:0 0 0 0 rgba(20,212,180,0)}}

/* Top */
.top{position:sticky;top:0;z-index:50;background:rgba(240,243,250,.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:16px 30px;display:flex;align-items:center;justify-content:space-between;gap:18px}
.top-left{display:flex;align-items:center;gap:12px;min-width:0}
.logo-i{width:40px;height:40px;background:var(--grad);border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 4px 14px var(--glow)}
.top-info{min-width:0}
.top-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.4px;display:flex;align-items:center;gap:10px;line-height:1.1}
.live-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;background:rgba(244,63,94,.1);border-radius:14px;font-size:10px;font-weight:700;color:var(--rose);letter-spacing:1.2px;text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--rose);animation:pulse 1.5s infinite}
.top-sub{font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-right{display:flex;align-items:center;gap:14px}
.top-stat{display:flex;align-items:baseline;gap:8px;padding:8px 16px;background:#fff;border:1.5px solid var(--border);border-radius:12px}
.top-stat-n{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;line-height:1;letter-spacing:-.5px;color:var(--primary);font-variant-numeric:tabular-nums}
.top-stat-l{font-size:12px;color:var(--muted);font-weight:500}
.top-clock{font-family:'Syne',sans-serif;font-weight:600;font-size:14px;font-variant-numeric:tabular-nums;padding:8px 14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;color:var(--text)}
#admin-toggle{display:none !important}
#admin-toggle.visible{display:inline-flex !important}
#admin-toggle.active{background:var(--grad) !important;color:#fff !important;border-color:transparent !important;box-shadow:0 4px 14px rgba(45,91,227,.25)}

/* Admin tabs + search */
.admin-bar{padding:14px 30px 0}
.tabs{display:inline-flex;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:4px;gap:2px;box-shadow:0 2px 8px rgba(10,14,46,.03);flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:7px;transition:all .15s}
.tab.active{background:var(--grad);color:#fff}
.tab:not(.active):hover{color:var(--primary)}

.search-wrap{margin-top:12px;position:relative;max-width:460px}
.search-box{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;transition:border-color .15s}
.search-box:focus-within{border-color:var(--primary)}
.search-box input{flex:1;border:none;outline:none;background:none;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);min-width:0}
.search-box input::placeholder{color:var(--muted);opacity:.7}
.search-clear{width:22px;height:22px;border-radius:50%;border:none;background:rgba(45,91,227,.1);color:var(--primary);cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.search-results{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1.5px solid var(--border);border-radius:12px;box-shadow:0 10px 32px rgba(10,14,46,.08);max-height:320px;overflow-y:auto;z-index:20}
.tcr-item{padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:background .12s;border-bottom:1px solid rgba(45,91,227,.04)}
.tcr-item:last-child{border-bottom:none}
.tcr-item:hover{background:rgba(45,91,227,.05)}
.tcr-ava{width:32px;height:32px;border-radius:10px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;flex-shrink:0}
.tcr-name{font-size:13px;font-weight:600;color:var(--text)}
.tcr-empty{padding:18px;text-align:center;font-size:13px;color:var(--muted)}

.watching-pill{margin-top:12px;display:none;align-items:center;gap:10px;padding:8px 14px;background:rgba(45,91,227,.06);border:1.5px solid rgba(45,91,227,.15);border-radius:12px;font-size:13px;max-width:fit-content}
.watching-pill.show{display:inline-flex}
.watching-close{margin-left:6px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(45,91,227,.1);color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}

/* Main */
.main{padding:26px 30px;animation:fadeIn .3s ease}

.live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

.s-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:18px;animation:fadeIn .25s ease;transition:transform .2s,box-shadow .2s}
.s-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(45,91,227,.08)}

.s-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.s-ava{width:40px;height:40px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;position:relative}
.s-ava::after{content:'';position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;background:var(--teal);border:2.5px solid var(--card);animation:pulseDot 2s infinite}
.s-who{flex:1;min-width:0}
.s-name{font-family:'Syne',sans-serif;font-weight:600;font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.s-test{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.s-progress{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.s-q{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.8px;line-height:1;color:var(--primary)}
.s-q sub{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);font-weight:400;vertical-align:baseline;margin-left:2px}
.s-pct{font-family:'Syne',sans-serif;font-weight:600;font-size:14px;color:var(--text)}
.s-bar{height:6px;background:rgba(45,91,227,.08);border-radius:4px;overflow:hidden;margin-bottom:12px}
.s-bar-fill{height:100%;background:var(--grad);border-radius:4px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}

.s-meta{display:flex;align-items:center;gap:6px;padding-top:12px;border-top:1px solid rgba(45,91,227,.06);font-size:12px;color:var(--muted);flex-wrap:wrap}
.s-meta-item{display:inline-flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums;font-weight:500}
.s-meta-item svg{flex-shrink:0;opacity:.7}
.s-meta-spacer{flex:1;min-width:4px}
.s-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:14px;font-size:11px;font-weight:600;background:rgba(20,212,180,.1);color:#0d9e85;white-space:nowrap}
.s-tag .dot{width:5px;height:5px;border-radius:50%;background:#0d9e85}

/* Suspicious states — колір картки залежно від рейтингу порушень */
.s-card.susp-low{border-color:rgba(245,158,11,.35);background:linear-gradient(180deg,rgba(245,158,11,.04),var(--card) 60%)}
.s-card.susp-mid{border-color:rgba(245,158,11,.55);background:linear-gradient(180deg,rgba(245,158,11,.09),var(--card) 60%)}
.s-card.susp-high{border-color:rgba(244,63,94,.55);background:linear-gradient(180deg,rgba(244,63,94,.09),var(--card) 60%)}
.s-card.susp-low .s-ava::after{background:var(--amber)}
.s-card.susp-mid .s-ava::after{background:var(--amber)}
.s-card.susp-high .s-ava::after{background:var(--rose);animation:pulseDotRed 1.4s infinite}
@keyframes pulseDotRed{0%{box-shadow:0 0 0 0 rgba(244,63,94,.6)}70%{box-shadow:0 0 0 12px rgba(244,63,94,0)}100%{box-shadow:0 0 0 0 rgba(244,63,94,0)}}

.v-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;border-radius:10px;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.v-chip.v-tab{background:rgba(245,158,11,.12);color:#b45309}
.v-chip.v-copy{background:rgba(147,51,234,.12);color:#7e22ce}
.v-chip.v-shot{background:rgba(244,63,94,.12);color:#be123c}
.v-chip svg{opacity:.9}

/* Empty */
.empty{padding:100px 20px;text-align:center}
.empty-i{width:72px;height:72px;margin:0 auto 18px;border-radius:20px;background:var(--grad);opacity:.25;display:flex;align-items:center;justify-content:center;color:#fff}
.empty-i svg{width:34px;height:34px}
.empty-t{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;color:var(--text);margin-bottom:6px;letter-spacing:-.3px}
.empty-s{font-size:14px;color:var(--muted);max-width:380px;margin:0 auto;line-height:1.5}

/* Loader */
#loader{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spin{width:44px;height:44px;border:3.5px solid rgba(45,91,227,.15);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}

/* Adaptation */
@media (min-width:1600px){
  .live-grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .main{padding:32px 40px}
  .top{padding:18px 40px}
  .top-title{font-size:26px}
  .top-stat-n{font-size:26px}
  .logo-i{width:46px;height:46px;font-size:19px}
  .admin-bar{padding:16px 40px 0}
}
@media (min-width:2200px){
  .live-grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
  .top-title{font-size:30px}
  .s-name{font-size:17px}
  .s-q{font-size:26px}
}
@media (max-width:1000px){
  .top{padding:14px 20px}
  .main{padding:20px}
  .admin-bar{padding:12px 20px 0}
  .live-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .s-card{padding:16px;border-radius:16px}
}
@media (max-width:700px){
  .top{flex-wrap:wrap;padding:12px 16px;gap:10px}
  .top-left{gap:10px}
  .logo-i{width:36px;height:36px;font-size:15px;border-radius:10px}
  .top-title{font-size:18px}
  .top-sub{font-size:12px}
  .live-tag{padding:2px 7px;font-size:9px}
  .top-right{width:100%;gap:8px}
  .top-stat{flex:1;padding:7px 12px;justify-content:center;gap:6px}
  .top-stat-n{font-size:18px}
  .top-stat-l{font-size:11px}
  .top-clock{padding:7px 11px;font-size:13px}
  #admin-toggle{width:36px;height:36px}
  .admin-bar{padding:10px 14px 0}
  .tab{padding:7px 12px;font-size:12px}
  .main{padding:14px}
  .live-grid{grid-template-columns:1fr 1fr;gap:10px}
  .s-card{padding:14px;border-radius:14px}
  .s-ava{width:36px;height:36px;font-size:12px}
  .s-name{font-size:13px}
  .s-test{font-size:11px}
  .s-q{font-size:18px}
  .s-q sub{font-size:11px}
  .s-pct{font-size:12px}
  .s-meta{font-size:11px;padding-top:10px}
  .s-meta-item svg{width:10px;height:10px}
  .s-tag{font-size:10px;padding:2px 7px}
}
@media (max-width:440px){
  .live-grid{grid-template-columns:1fr}
  .top-title{font-size:17px}
}
</style>
</head>
<body>
  <div id="loader"><div class="spin"></div><div style="font-size:13px;color:var(--muted)">Завантаження...</div></div>

  <header class="top">
    <div class="top-left">
      <div class="logo-i">Q</div>
      <div class="top-info">
        <div class="top-title">
          <span>Live</span>
          <span class="live-tag"><span class="live-dot"></span>Online</span>
        </div>
        <div class="top-sub" id="teacher-name">—</div>
      </div>
    </div>
    <div class="top-right">
      <div class="top-stat">
        <span class="top-stat-n" id="stat-active">0</span>
        <span class="top-stat-l">проходять</span>
      </div>
      <div class="top-clock" id="clock">—:—:—</div>
      <button id="admin-toggle" onclick="toggleAdminBar()" title="Панель адміна" style="display:none;width:40px;height:40px;border-radius:12px;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--muted);align-items:center;justify-content:center;transition:all .15s;flex-shrink:0"
        onmouseover="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'"
        onmouseout="if(!this.classList.contains('active')){this.style.borderColor='var(--border)';this.style.color='var(--muted)'}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Admin bar (видно тільки для admin і коли toggle увімкнений) -->
  <div class="admin-bar" id="admin-bar" style="display:none">
    <div class="tabs">
      <button id="tab-mine" class="tab active" onclick="switchTab('mine')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
        Мій лайв
      </button>
      <button id="tab-others" class="tab" onclick="switchTab('others')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Інші викладачі
      </button>
    </div>

    <div class="search-wrap" id="search-wrap" style="display:none">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" placeholder="Почніть вводити ПІБ викладача..." autocomplete="off"/>
        <button id="search-clear" class="search-clear" onclick="clearSearch()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <div id="watching-pill" class="watching-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="color:var(--primary);flex-shrink:0"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      <span style="color:var(--muted)">Дивитесь лайв:</span>
      <span id="watching-name" style="font-weight:700;color:var(--text)">—</span>
      <button class="watching-close" onclick="switchTab('mine')" title="Повернутись до свого">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <main class="main">
    <div class="live-grid" id="grid-active"></div>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-i">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </div>
      <div class="empty-t" id="empty-title">Зараз ніхто не проходить тест</div>
      <div class="empty-s" id="empty-text">Коли студенти почнуть виконувати завдання — вони з'являться тут автоматично</div>
    </div>
  </main>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, onValue, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg = {apiKey:"AIzaSyDsA4IQkn5tV41LDK43vzgm0XnRnbdgvTc",authDomain:"quizflow-8a978.firebaseapp.com",databaseURL:"https://quizflow-8a978-default-rtdb.europe-west1.firebasedatabase.app",projectId:"quizflow-8a978",storageBucket:"quizflow-8a978.firebasestorage.app",messagingSenderId:"206469794166",appId:"1:206469794166:web:55cd7007b429607acd5257"};
const app = getApps().length ? getApps()[0] : initializeApp(cfg);
const db  = getDatabase(app);

// ─── Auth: читаємо з sessionStorage АБО з localStorage (fix для нової вкладки) ──
let sess = sessionStorage.getItem("qf_user");
if(!sess) sess = localStorage.getItem("qf_user");
if(!sess){ location.href = "login.html"; throw ""; }
const _user = JSON.parse(sess);
if(!_user || !_user.id){ location.href = "login.html"; throw ""; }
// Синхронізуємо щоб у новій вкладці теж було
try { sessionStorage.setItem("qf_user", sess); localStorage.setItem("qf_user", sess); } catch {}

const _myUid = _user.id;
const _myName = _user.name || _user.login;
const _isAdmin = _user.role === "admin";

document.getElementById("teacher-name").textContent = _myName;
// Для адміна — показуємо кнопку-тогл зверху (не сам бар)
if(_isAdmin){
  const toggleBtn = document.getElementById("admin-toggle");
  toggleBtn.classList.add("visible");
  // Запам'ятовуємо чи бар відкрито — читаємо з localStorage
  const wasOpen = localStorage.getItem("qf_live_admin_open") === "1";
  if(wasOpen){
    document.getElementById("admin-bar").style.display = "block";
    toggleBtn.classList.add("active");
  }
}

window.toggleAdminBar = function(){
  const bar = document.getElementById("admin-bar");
  const btn = document.getElementById("admin-toggle");
  const isHidden = bar.style.display === "none" || !bar.style.display;
  if(isHidden){
    bar.style.display = "block";
    btn.classList.add("active");
    localStorage.setItem("qf_live_admin_open", "1");
  } else {
    bar.style.display = "none";
    btn.classList.remove("active");
    btn.style.borderColor = "var(--border)";
    btn.style.color = "var(--muted)";
    localStorage.setItem("qf_live_admin_open", "0");
    // При закритті — повертаємось до свого лайву
    if(_activeUid !== _myUid){
      switchTab("mine");
    }
    // Також закриваємо дропдаун пошуку якщо було відкрито
    document.getElementById("search-results").style.display = "none";
  }
};

// ─── Helpers ────────────────────────────────────────────────────────
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ─── FIX: нормалізуємо startedAt до мілісекунд незалежно від формату ──
// Firebase може повернути: число (мс), число (секунди), ISO-рядок, або об'єкт {".sv":"timestamp"}
function toMs(v){
  if(!v) return 0;
  if(typeof v === "number"){
    // Якщо менше 1e10 — це секунди (Unix timestamp), конвертуємо в мс
    return v < 1e10 ? v * 1000 : v;
  }
  if(typeof v === "string"){
    const parsed = Date.parse(v);
    return isNaN(parsed) ? 0 : parsed;
  }
  return 0;
}

function formatDuration(ms){
  const secs = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  if(h > 0) return h + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  return m + ":" + String(s).padStart(2,"0");
}
function initials(name){
  return (name||"?").split(/\s+/).map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
}

// ─── Clock ──────────────────────────────────────────────────────────
function updateClock(){
  const d = new Date();
  document.getElementById("clock").textContent =
    String(d.getHours()).padStart(2,"0") + ":" +
    String(d.getMinutes()).padStart(2,"0") + ":" +
    String(d.getSeconds()).padStart(2,"0");
}
updateClock();
setInterval(updateClock, 1000);

// ─── State ──────────────────────────────────────────────────────────
let _activeUid  = _myUid;
let _activeName = _myName;
let _tests = {};
let _lastAttempts = {};
let _currentRef = null;
let _currentSub = null;

// ─── Load tests (для назв) ───────────────────────────────────────────
async function loadTests(uid){
  _tests = {};
  const snap = await get(ref(db, `teachers/${uid}/tests`));
  if(snap.exists()) _tests = snap.val() || {};
}

// ─── Card ───────────────────────────────────────────────────────────
// Повертає CSS-клас для рівня порушень
function suspClass(score){
  if(score <= 0) return "";
  if(score <= 2) return "susp-low";
  if(score <= 5) return "susp-mid";
  return "susp-high";
}

function suspScore(a){
  return (a.tabSwitches||0)*2 + (a.copyAttempts||0)*3 + (a.screenshots||0)*5;
}

// HTML для чіпів порушень (використовується і в buildCard і в updateCard)
function violationsHTML(a){
  const tab = a.tabSwitches || 0;
  const cp = a.copyAttempts || 0;
  const sh = a.screenshots || 0;
  let html = "";
  if(tab>0) html += `<span class="v-chip v-tab" title="Переключення вкладок: ${tab}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>${tab}</span>`;
  if(cp>0)  html += `<span class="v-chip v-copy" title="Копіювання: ${cp}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>${cp}</span>`;
  if(sh>0)  html += `<span class="v-chip v-shot" title="Скріншоти: ${sh}"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>${sh}</span>`;
  return html;
}

// Створення нової картки (повний HTML — викликається тільки один раз при появі студента)
function buildCard(a){
  const name = (a.name||"") + " " + (a.surname||"");
  const display = name.trim() || "Студент";
  const testTitle = _tests[a.testId]?.title || "Тест";
  const totalQ = a.totalQ || _tests[a.testId]?.questions?.length || 0;
  const currentQ = a.currentQ || 0;
  const pct = totalQ > 0 ? Math.round((currentQ/totalQ)*100) : 0;
  // FIX: використовуємо toMs() для правильної конвертації startedAt
  const startMs = toMs(a.startedAt);
  const duration = startMs ? Date.now() - startMs : 0;
  const tab = a.tabSwitches || 0;
  const cp = a.copyAttempts || 0;
  const sh = a.screenshots || 0;
  const sc = suspClass(suspScore(a));

  const el = document.createElement("div");
  el.className = "s-card" + (sc ? " " + sc : "");
  el.dataset.id = a.id;
  el.dataset.totalQ = totalQ;
  el.innerHTML = `
    <div class="s-head">
      <div class="s-ava">${initials(display)}</div>
      <div class="s-who">
        <div class="s-name">${esc(display)}</div>
        <div class="s-test">${esc(testTitle)}</div>
      </div>
    </div>
    <div class="s-progress">
      <div class="s-q" data-field="q">${currentQ}<sub>/${totalQ||"?"}</sub></div>
      <div class="s-pct" data-field="pct">${pct}%</div>
    </div>
    <div class="s-bar"><div class="s-bar-fill" data-field="bar" style="width:${pct}%"></div></div>
    <div class="s-meta">
      <span class="s-meta-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span data-field="duration">${formatDuration(duration)}</span>
      </span>
      <span data-field="violations" data-key="${tab}|${cp}|${sh}" style="display:inline-flex;align-items:center;gap:5px">${violationsHTML(a)}</span>
      <span class="s-meta-spacer"></span>
      <span class="s-tag"><span class="dot"></span>Активний</span>
    </div>`;
  return el;
}

// Оновлення існуючої картки (тільки динамічні поля — без блимання)
function updateCard(el, a){
  const totalQ = Number(el.dataset.totalQ) || a.totalQ || _tests[a.testId]?.questions?.length || 0;
  const currentQ = a.currentQ || 0;
  const pct = totalQ > 0 ? Math.round((currentQ/totalQ)*100) : 0;
  // FIX: використовуємо toMs() для правильної конвертації startedAt
  const startMs = toMs(a.startedAt);
  const duration = startMs ? Date.now() - startMs : 0;
  const tab = a.tabSwitches || 0;
  const cp = a.copyAttempts || 0;
  const sh = a.screenshots || 0;
  const sc = suspClass(suspScore(a));

  // Питання (тільки якщо змінилось)
  const qEl = el.querySelector('[data-field="q"]');
  const qText = `${currentQ}/${totalQ||"?"}`;
  if(qEl.dataset.val !== qText){
    qEl.innerHTML = `${currentQ}<sub>/${totalQ||"?"}</sub>`;
    qEl.dataset.val = qText;
  }

  // %
  const pctEl = el.querySelector('[data-field="pct"]');
  const pctText = pct + "%";
  if(pctEl.textContent !== pctText) pctEl.textContent = pctText;

  // Бар
  const barEl = el.querySelector('[data-field="bar"]');
  if(barEl.style.width !== pct + "%") barEl.style.width = pct + "%";

  // Тривалість — оновлюємо завжди, бо змінюється щосекунди
  const durEl = el.querySelector('[data-field="duration"]');
  const durText = formatDuration(duration);
  if(durEl.textContent !== durText) durEl.textContent = durText;

  // Порушення — просто переписуємо HTML-чіпи якщо лічильники змінились
  const vEl = el.querySelector('[data-field="violations"]');
  const vKey = `${tab}|${cp}|${sh}`;
  if(vEl.dataset.key !== vKey){
    vEl.dataset.key = vKey;
    vEl.innerHTML = violationsHTML(a);
  }

  // Клас susp-* (колір картки)
  const currentSusp = ["susp-low","susp-mid","susp-high"].find(c => el.classList.contains(c));
  if(currentSusp !== sc){
    if(currentSusp) el.classList.remove(currentSusp);
    if(sc) el.classList.add(sc);
  }
}

// ─── Render (diff-based — без блимання) ──────────────────────────────
function render(attempts){
  const active = [];
  Object.entries(attempts||{}).forEach(([id, a]) => {
    if(!a) return;
    if(a.status === "in_progress" && !a.finishedAt){
      active.push({id, ...a});
    }
  });
  // FIX: використовуємо toMs() при сортуванні
  active.sort((a,b) => (b.currentQ||0) - (a.currentQ||0) || toMs(a.startedAt) - toMs(b.startedAt));

  document.getElementById("stat-active").textContent = active.length;

  const grid = document.getElementById("grid-active");
  const existing = new Map();
  grid.querySelectorAll(".s-card").forEach(el => existing.set(el.dataset.id, el));
  const activeIds = new Set(active.map(a => a.id));

  // Видаляємо картки студентів яких більше немає
  for(const [id, el] of existing){
    if(!activeIds.has(id)) el.remove();
  }

  // Для кожного активного — або створюємо, або оновлюємо; також правильний порядок
  let prevEl = null;
  for(const a of active){
    let el = existing.get(a.id);
    if(!el){
      el = buildCard(a);
      existing.set(a.id, el);
    } else {
      updateCard(el, a);
    }
    // Ставимо в правильне місце в гріді
    if(prevEl){
      if(prevEl.nextSibling !== el) prevEl.parentNode.insertBefore(el, prevEl.nextSibling);
    } else {
      if(grid.firstChild !== el) grid.insertBefore(el, grid.firstChild);
    }
    prevEl = el;
  }

  const empty = document.getElementById("empty");
  empty.style.display = active.length === 0 ? "block" : "none";
}

// ─── Subscribe to teacher's live ────────────────────────────────────
async function subscribeToTeacher(uid, name){
  _activeUid = uid;
  _activeName = name;

  // Відписуємось від попереднього
  if(_currentRef && _currentSub){
    off(_currentRef, "value", _currentSub);
    _currentRef = null;
    _currentSub = null;
  }

  _lastAttempts = {};
  document.getElementById("loader").style.display = "flex";
  document.getElementById("grid-active").innerHTML = "";

  // Плашка "Дивитесь лайв…" тільки для адмінів коли не свій
  const pill = document.getElementById("watching-pill");
  if(_isAdmin && uid !== _myUid){
    pill.classList.add("show");
    document.getElementById("watching-name").textContent = name;
    document.getElementById("empty-title").textContent = "Зараз ніхто не проходить тест";
    document.getElementById("empty-text").textContent = "Коли студенти почнуть виконувати завдання — вони з'являться тут автоматично";
  } else {
    pill.classList.remove("show");
  }

  await loadTests(uid);

  _currentRef = ref(db, `teachers/${uid}/attempts`);
  _currentSub = onValue(_currentRef, (snap) => {
    _lastAttempts = snap.val() || {};
    render(_lastAttempts);
    document.getElementById("loader").style.display = "none";
  }, (err) => {
    console.error("Live subscription error:", err);
    document.getElementById("loader").style.display = "none";
  });
}

// ─── Admin tabs ─────────────────────────────────────────────────────
window.switchTab = async function(which){
  const mineBtn = document.getElementById("tab-mine");
  const othersBtn = document.getElementById("tab-others");
  const searchWrap = document.getElementById("search-wrap");

  if(which === "mine"){
    mineBtn.classList.add("active");
    othersBtn.classList.remove("active");
    searchWrap.style.display = "none";
    document.getElementById("search-results").style.display = "none";
    if(_activeUid !== _myUid){
      await subscribeToTeacher(_myUid, _myName);
    }
  } else {
    othersBtn.classList.add("active");
    mineBtn.classList.remove("active");
    searchWrap.style.display = "block";
    document.getElementById("search-input").focus();

    if(_activeUid === _myUid){
      if(_currentRef && _currentSub){
        off(_currentRef, "value", _currentSub);
        _currentRef = null; _currentSub = null;
      }
      _lastAttempts = {};
      _activeUid = null;
      render({});
      document.getElementById("stat-active").textContent = 0;
      document.getElementById("watching-pill").classList.remove("show");
      // Залишаємо дефолтний empty-стан — "Зараз ніхто не проходить тест"
      const empty = document.getElementById("empty");
      empty.style.display = "block";
      document.getElementById("empty-title").textContent = "Зараз ніхто не проходить тест";
      document.getElementById("empty-text").textContent = "Коли студенти почнуть виконувати завдання — вони з'являться тут автоматично";
    }
  }
};

// ─── Search teachers ────────────────────────────────────────────────
let _allTeachers = [];
let _teachersLoaded = false;

async function loadAllTeachers(){
  if(_teachersLoaded) return;
  try {
    const snap = await get(ref(db, "users"));
    if(!snap.exists()){ _teachersLoaded = true; return; }
    const users = snap.val();
    _allTeachers = Object.entries(users)
      .map(([id, u]) => ({
        id,
        name: (u && u.name) || "",
        login: (u && u.login) || "",
        role: (u && u.role) || "",
        blocked: !!(u && u.blocked)
      }))
      .filter(u => u.id && u.id !== _myUid && u.role !== "admin" && !u.blocked)
      .sort((a,b) => (a.name || a.login).localeCompare(b.name || b.login, "uk"));
    _teachersLoaded = true;
  } catch(e){
    console.error("loadAllTeachers:", e);
  }
}

function searchTeachers(q){
  q = (q || "").trim().toLowerCase();
  const resBox = document.getElementById("search-results");
  if(!q){
    resBox.style.display = "none";
    return;
  }
  const matches = _allTeachers.filter(t =>
    (t.name || "").toLowerCase().includes(q) ||
    (t.login || "").toLowerCase().includes(q)
  ).slice(0, 12);

  if(matches.length === 0){
    resBox.innerHTML = `<div class="tcr-empty">Нікого не знайдено</div>`;
  } else {
    resBox.innerHTML = matches.map(t => {
      const display = t.name || t.login;
      const init = display.split(/\s+/).map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
      return `<div class="tcr-item" data-uid="${t.id}" data-name="${esc(display)}">
        <div class="tcr-ava">${init}</div>
        <div class="tcr-name">${esc(display)}</div>
      </div>`;
    }).join("");
    resBox.querySelectorAll(".tcr-item").forEach(el => {
      el.addEventListener("click", () => {
        const uid = el.getAttribute("data-uid");
        // декодуємо з HTML-entities назад
        const tmp = document.createElement("textarea");
        tmp.innerHTML = el.getAttribute("data-name");
        const name = tmp.value;
        pickTeacher(uid, name);
      });
    });
  }
  resBox.style.display = "block";
}

async function pickTeacher(uid, name){
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  document.getElementById("search-results").style.display = "none";
  await subscribeToTeacher(uid, name);
}

window.clearSearch = function(){
  const inp = document.getElementById("search-input");
  inp.value = "";
  inp.focus();
  document.getElementById("search-clear").style.display = "none";
  document.getElementById("search-results").style.display = "none";
};

function initSearchHandlers(){
  const inp = document.getElementById("search-input");
  const clr = document.getElementById("search-clear");
  if(!inp) return;
  inp.addEventListener("input", e => {
    const v = e.target.value;
    clr.style.display = v ? "inline-flex" : "none";
    searchTeachers(v);
  });
  inp.addEventListener("focus", async () => {
    await loadAllTeachers();
    if(inp.value) searchTeachers(inp.value);
  });
  document.addEventListener("click", e => {
    const wrap = document.getElementById("search-wrap");
    if(wrap && !wrap.contains(e.target)){
      document.getElementById("search-results").style.display = "none";
    }
  });
}

// ─── Тікаємо час щосекунди — оновлюємо тільки duration-span (не весь render) ─
setInterval(() => {
  if(!_activeUid || Object.keys(_lastAttempts).length === 0) return;
  const grid = document.getElementById("grid-active");
  grid.querySelectorAll(".s-card").forEach(el => {
    const id = el.dataset.id;
    const a = _lastAttempts[id];
    if(!a || !a.startedAt) return;
    const durEl = el.querySelector('[data-field="duration"]');
    if(!durEl) return;
    // FIX: використовуємо toMs() для правильної конвертації startedAt
    const startMs = toMs(a.startedAt);
    if(!startMs) return;
    const text = formatDuration(Date.now() - startMs);
    if(durEl.textContent !== text) durEl.textContent = text;
  });
}, 1000);

// ─── Init ────────────────────────────────────────────────────────────
(async () => {
  initSearchHandlers();
  // Стартово підписуємось на свого (адмін теж починає зі свого)
  await subscribeToTeacher(_myUid, _myName);
})();
</script>
