<style>
/* Layout */
.row-2{display:grid; grid-template-columns:1fr 1fr; gap:14px}
@media (max-width:1100px){.row-2{grid-template-columns:1fr}}

/* Provider card */
.prov-card{
  background:#fff; border:1px solid var(--line); border-radius:16px;
  padding:22px; display:flex; flex-direction:column; gap:18px;
}
.prov-head{display:flex; align-items:center; gap:12px}
.prov-mark{
  width:42px; height:42px; border-radius:12px; flex:0 0 auto;
  display:grid; place-items:center; color:#fff;
}
.prov-mark.groq{background:linear-gradient(135deg, #F59E0B, #D97706); box-shadow:0 6px 14px -6px rgba(245,158,11,.5)}
.prov-mark.gemini{background:linear-gradient(135deg, #22C55E, #15803D); box-shadow:0 6px 14px -6px rgba(34,197,94,.5)}
.prov-name{font-weight:800; font-size:16px; letter-spacing:-.01em; line-height:1.2}
.prov-link{font-size:11.5px; color:#6D28D9; text-decoration:none; font-family:"Geist Mono",monospace; margin-top:2px; display:inline-flex; align-items:center; gap:4px}
.prov-link:hover{text-decoration:underline}
.prov-link svg{opacity:.7}

.prov-section-l{font-size:10.5px; color:var(--ink-400); text-transform:uppercase; letter-spacing:.07em; font-weight:700; margin-bottom:8px; display:flex; align-items:center; gap:6px}
.prov-section-l svg{opacity:.7}

/* API key input */
.api-key-wrap{position:relative; display:flex; align-items:center}
.api-key-input{
  width:100%; padding:11px 44px 11px 12px;
  border-radius:10px; border:1.5px solid var(--line); background:#FAFBFE;
  font-family:"Geist Mono",monospace; font-size:13px; color:var(--ink-900);
  outline:none; transition:all .15s;
}
.api-key-input:focus{border-color:#7C3AED; box-shadow:0 0 0 3px rgba(124,58,237,.12); background:#fff}
.api-key-toggle{
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  width:30px; height:30px; border-radius:7px; border:0;
  background:transparent; cursor:pointer; color:var(--ink-400);
  display:grid; place-items:center; padding:0;
}
.api-key-toggle:hover{background:#F4F6FB; color:var(--ink-700)}
.api-key-toggle svg{width:15px; height:15px}

/* Model picker */
.model-list{display:flex; flex-direction:column; gap:6px}
.model-lbl{
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-radius:10px;
  border:1.5px solid var(--line); cursor:pointer;
  transition:all .15s; background:#fff;
}
.model-lbl:hover{border-color:var(--line-strong)}
.model-lbl.on{
  border-color:#7C3AED;
  background:linear-gradient(135deg, #F5F3FF, rgba(245,243,255,.4));
}
.model-lbl input{margin:2px 0 0; accent-color:#7C3AED; cursor:pointer; flex:0 0 auto}
.model-lbl .nm{font-weight:700; font-size:12.5px; font-family:"Geist Mono",monospace; color:var(--ink-900); line-height:1.3}
.model-lbl .desc{font-size:11.5px; color:var(--ink-500); margin-top:3px}
.model-lbl.on .nm{color:#6D28D9}

/* Features grid */
.feat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
@media (max-width:900px){.feat-grid{grid-template-columns:1fr}}

.feat-tile{
  background:#FAFBFE; border:1.5px solid var(--line); border-radius:13px;
  padding:14px;
}
.feat-tile-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px}
.feat-tile-l{display:flex; align-items:center; gap:10px; flex:1; min-width:0}
.feat-tile-ico{
  width:32px; height:32px; border-radius:9px; flex:0 0 auto;
  display:grid; place-items:center;
}
.feat-tile-ico.violet{background:rgba(124,58,237,.1); color:#6D28D9}
.feat-tile-ico.blue{background:rgba(59,130,246,.1); color:#1D4ED8}
.feat-tile-ico.amber{background:rgba(245,158,11,.1); color:#B45309}
.feat-tile-ico.green{background:rgba(22,163,74,.1); color:#15803D}
.feat-tile-name{font-weight:700; font-size:13px; line-height:1.2}
.feat-tile-desc{font-size:11.5px; color:var(--ink-500); margin-top:2px}

/* Toggle */
.toggle-sw{position:relative; display:inline-block; width:38px; height:22px; flex:0 0 auto}
.toggle-sw input{display:none}
.toggle-sl{
  position:absolute; inset:0; cursor:pointer;
  background:#E3E8F2; border-radius:99px; transition:background .2s;
}
.toggle-sl::before{
  content:""; position:absolute; top:2px; left:2px;
  width:18px; height:18px; border-radius:50%; background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.18); transition:transform .2s;
}
.toggle-sw input:checked + .toggle-sl{background:linear-gradient(135deg, #7C3AED, #4F46E5)}
.toggle-sw input:checked + .toggle-sl::before{transform:translateX(16px)}

/* Provider toggle (Groq/Gemini per feature) */
.fp-row{display:flex; gap:6px}
.fp-btn{
  flex:1; padding:8px; border-radius:8px;
  border:1.5px solid var(--line); background:#fff;
  font:inherit; font-size:12px; font-weight:700; color:var(--ink-500);
  cursor:pointer; transition:all .15s;
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
}
.fp-btn:hover:not(.on){border-color:var(--line-strong); color:var(--ink-700)}
.fp-btn.on{border-color:#7C3AED; background:#F5F3FF; color:#6D28D9}
.fp-btn .pdot{width:6px; height:6px; border-radius:50%; flex:0 0 auto}
.fp-btn[data-prov="groq"] .pdot{background:#F59E0B}
.fp-btn[data-prov="gemini"] .pdot{background:#22C55E}

/* Status */
.save-status{
  background:linear-gradient(135deg, rgba(22,163,74,.08), rgba(22,163,74,.04));
  border:1.5px solid rgba(22,163,74,.3);
  border-radius:12px; padding:12px 16px;
  color:#15803D; font-weight:600; font-size:13px;
  display:flex; align-items:center; gap:9px;
}
.save-status svg{flex:0 0 auto}

/* Footer note */
.foot-note{
  display:flex; align-items:center; gap:8px;
  margin-top:8px;
  font-size:12px; color:var(--ink-400);
}
.foot-note svg{opacity:.7; flex:0 0 auto}
</style>

  <button class="tb-btn primary" id="btn-save-ai">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Зберегти
  </button>
`;

const { _user } = await initAdminShell({
  activeId: "ai",
  crumbs: ["AI Налаштування"],
  content,
  topbarRight
});

// Page-head
const contentEl = document.getElementById("admin-content");
if (contentEl){
  const pageHead = document.createElement("div");
  pageHead.className = "page-head";
  pageHead.innerHTML = `<div><h1>AI Налаштування</h1><p>Глобальні налаштування провайдерів, моделей та функцій штучного інтелекту</p></div>`;
  contentEl.insertBefore(pageHead, contentEl.firstChild);
}

// ─── State ────────────────────────────────────────────────────────────────
const _featProvs = { comments:"groq", analysis:"groq", generation:"groq", textcheck:"groq" };

// ─── Helpers ──────────────────────────────────────────────────────────────
window.setFeatProv = function(feat, prov){
  _featProvs[feat] = prov;
  ["groq","gemini"].forEach(p => {
    const btn = document.getElementById(`fp-${feat}-${p}`);
    if (btn) btn.classList.toggle("on", p === prov);
  });
};

function highlightModels(){
  document.querySelectorAll(".model-lbl").forEach(lbl => {
    const inp = lbl.querySelector("input");
    lbl.classList.toggle("on", !!inp?.checked);
  });
}

window.toggleKeyVisibility = (inputId, iconId) => {
  const inp = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (!inp) return;
  inp.type = inp.type === "password" ? "text" : "password";
  icon.innerHTML = inp.type === "text"
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
};

// ─── Load ─────────────────────────────────────────────────────────────────
async function loadAISettings(){
  try {
    const s = await dbGet("settings/ai");
    if (!s){ highlightModels(); return; }

    const gk = document.getElementById("ai-groq-key");
    if (gk) gk.value = s.groqApiKey || s.apiKey || "";

    const gemk = document.getElementById("ai-gemini-key");
    if (gemk) gemk.value = s.geminiApiKey || "";

    if (s.groqModel){
      const r = document.querySelector(`input[name="ai-groq-model"][value="${s.groqModel}"]`);
      if (r) r.checked = true;
    }
    if (s.geminiModel){
      const r = document.querySelector(`input[name="ai-gemini-model"][value="${s.geminiModel}"]`);
      if (r) r.checked = true;
    }
    highlightModels();

    const tmap = {
      "ai-comments":   s.aiComments,
      "ai-analysis":   s.aiAnalysis,
      "ai-generation": s.aiGeneration,
      "ai-textcheck":  s.aiTextCheck
    };
    Object.entries(tmap).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.checked = val !== false;
    });

    const fp = s.featProviders || {};
    ["comments","analysis","generation","textcheck"].forEach(feat => {
      setFeatProv(feat, fp[feat] || "groq");
    });
  } catch (e){
    console.warn("Load AI settings:", e.message);
  }
}

// ─── Save ─────────────────────────────────────────────────────────────────
async function saveAISettings(){
  const groqKey   = document.getElementById("ai-groq-key")?.value.trim();
  const geminiKey = document.getElementById("ai-gemini-key")?.value.trim();
  const groqModel  = document.querySelector('input[name="ai-groq-model"]:checked')?.value || "llama-3.3-70b-versatile";
  const geminiModel= document.querySelector('input[name="ai-gemini-model"]:checked')?.value || "gemini-2.5-flash";
  const comments   = document.getElementById("ai-comments")?.checked;
  const analysis   = document.getElementById("ai-analysis")?.checked;
  const generation = document.getElementById("ai-generation")?.checked;
  const textcheck  = document.getElementById("ai-textcheck")?.checked;

  if (!groqKey && !geminiKey){ toast("Введіть хоча б один API ключ"); return; }

  const btn = document.getElementById("btn-save-ai");
  btn.disabled = true;

  try {
    await dbUpd("settings/ai", {
      groqApiKey: groqKey || "",
      geminiApiKey: geminiKey || "",
      groqModel, geminiModel,
      apiKey: groqKey || geminiKey || "",
      model: groqModel,
      provider: groqKey ? "groq" : "gemini",
      aiComments: comments,
      aiAnalysis: analysis,
      aiGeneration: generation,
      aiTextCheck: textcheck,
      featProviders: { ..._featProvs },
      updatedAt: Date.now()
    });

    const status = document.getElementById("ai-status");
    if (status){
      status.style.display = "";
      status.innerHTML = `<div class="save-status">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Налаштування збережено · застосуються одразу для всіх викладачів
      </div>`;
      setTimeout(() => { status.style.display = "none"; }, 3500);
    }
    toast("Налаштування AI збережено");
  } catch (e){
    toast("Помилка: " + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ─── Wire ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.model-lbl input').forEach(r => {
  r.addEventListener("change", highlightModels);
});

document.getElementById("btn-save-ai").addEventListener("click", saveAISettings);

// First load
await loadAISettings();
</script>
