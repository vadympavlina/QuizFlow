<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%232d5be3'/><stop offset='1' stop-color='%231a3ab8'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><rect x='7' y='9' width='12' height='2.5' rx='1.25' fill='white'/><rect x='7' y='14.75' width='18' height='2.5' rx='1.25' fill='white'/><rect x='7' y='20.5' width='9' height='2.5' rx='1.25' fill='white'/><circle cx='24' cy='22' r='5' fill='none' stroke='white' stroke-width='2.2'/><line x1='27.5' y1='25.5' x2='29.5' y2='27.5' stroke='white' stroke-width='2.2' stroke-linecap='round'/></svg>">
<title>QuizFlow — Вхід</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2d5be3;
    --rose: #f43f5e;
    --teal: #14d4b4;
    --text: #0d1340;
    --text-muted: #6b7280;
    --border: rgba(45,91,227,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f3fa;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(45,91,227,0.07) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(20,212,180,0.05) 0%, transparent 70%);
    bottom: -150px; left: -150px;
    pointer-events: none;
  }

  .card {
    background: white;
    border-radius: 28px;
    padding: 52px 48px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 80px rgba(45,91,227,0.12);
    position: relative;
    z-index: 1;
    animation: cardIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #2d5be3, #1a3ab8);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 20px; color: white;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 22px; color: var(--text);
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.4px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field { margin-bottom: 14px; }

  .field-label {
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 7px;
    font-weight: 500;
    display: block;
  }

  .field-wrap { position: relative; }

  .field-input {
    width: 100%;
    padding: 14px 48px 14px 18px;
    border-radius: 14px;
    border: 2px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: white;
  }

  .field-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(45,91,227,0.08);
  }

  .field-input.error {
    border-color: var(--rose);
    box-shadow: 0 0 0 4px rgba(244,63,94,0.08);
  }

  .field-input.shake {
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }

  .field-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    display: flex; align-items: center;
    pointer-events: none;
  }

  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
    display: flex; align-items: center;
    transition: color 0.2s;
  }

  .eye-btn:hover { color: var(--primary); }

  .error-msg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--rose);
    min-height: 22px;
    margin-bottom: 20px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .error-msg.show { opacity: 1; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #2d5be3, #1a3ab8);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 28px rgba(45,91,227,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(45,91,227,0.4); }
  .submit-btn:disabled { opacity: 0.65; transform: none; cursor: not-allowed; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #globalLoader {
    position: fixed; inset: 0;
    background: rgba(240,243,250,0.9);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }

  .loader-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(45,91,227,0.15);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loader-text { font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>

<div id="globalLoader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Перевірка сесії...</div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">Q</div>
    <span class="logo-name">QuizFlow</span>
  </div>

  <div class="title">Вхід</div>
  <div class="subtitle">Панель керування для викладача</div>

  <form id="loginForm" onsubmit="doLogin(); return false;" autocomplete="on">
  <div class="field">
    <label class="field-label">Логін</label>
    <div class="field-wrap">
      <input class="field-input" type="text" id="loginInput"
             name="username"
             placeholder="Введіть логін"
             autocomplete="username"
             onkeydown="if(event.key==='Enter') document.getElementById('passInput').focus()">
      <span class="field-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="field">
    <label class="field-label">Пароль</label>
    <div class="field-wrap">
      <input class="field-input" type="password" id="passInput"
             name="password"
             placeholder="Введіть пароль"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
      <button class="eye-btn" onclick="togglePass()" type="button">
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="errorText">Невірний логін або пароль</span>
  </div>

  <button class="submit-btn" id="submitBtn" type="submit">
    <span id="btnText">Увійти</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </button>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// js/firebase.js — Firebase Realtime Database


const firebaseConfig = {
  apiKey:            "AIzaSyDsA4IQkn5tV41LDK43vzgm0XnRnbdgvTc",
  authDomain:        "quizflow-8a978.firebaseapp.com",
  databaseURL:       "https://quizflow-8a978-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "quizflow-8a978",
  storageBucket:     "quizflow-8a978.firebasestorage.app",
  messagingSenderId: "206469794166",
  appId:             "1:206469794166:web:55cd7007b429607acd5257"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function snapToArray(snap) {
  if (!snap.exists()) return [];
  const val = snap.val();
  return Object.entries(val).map(([id, data]) => ({ id, ...data }));
}

function nowTs() {
  return Date.now();
}

// ─── ADMIN AUTH ───────────────────────────────────────────────────────────────

async function getAdmin() {
  const snap = await get(ref(db, "admin"));
  return snap.exists() ? snap.val() : null;
}

async function checkLogin(login, password) {
  const admin = await getAdmin();
  if (!admin) return false;
  return admin.login === login && admin.password === password;
}

// ─── TESTS ────────────────────────────────────────────────────────────────────

async function getTests() {
  const snap = await get(ref(db, "tests"));
  if (!snap.exists()) return [];
  const arr = snapToArray(snap);
  return arr.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}

async function getTest(testId) {
  const snap = await get(ref(db, `tests/${testId}`));
  if (!snap.exists()) return null;
  return { id: testId, ...snap.val() };
}

async function createTest(data) {
  const newRef = push(ref(db, "tests"));
  await set(newRef, {
    title:     data.title     || "Новий тест",
    folder:    data.folder    || "",
    tags:      data.tags      || [],
    timeLimit: data.timeLimit || 600,
    status:    "draft",
    questions: [],
    createdAt: nowTs()
  });
  return newRef.key;
}

async function saveTest(testId, data) {
  await update(ref(db, `tests/${testId}`), data);
}

async function deleteTest(testId) {
  await remove(ref(db, `tests/${testId}`));
  const linksSnap = await get(ref(db, "links"));
  if (linksSnap.exists()) {
    const updates = {};
    Object.entries(linksSnap.val()).forEach(([k, v]) => {
      if (v.testId === testId) updates[k] = null;
    });
    if (Object.keys(updates).length) await update(ref(db, "links"), updates);
  }
}

// ─── LINKS ────────────────────────────────────────────────────────────────────

async function createLink(testId, maxAttempts) {
  const newRef = push(ref(db, "links"));
  await set(newRef, {
    testId,
    maxAttempts:  Number(maxAttempts) || 30,
    usedAttempts: 0,
    status:       "active",
    createdAt:    nowTs()
  });
  return newRef.key;
}

async function getLink(linkId) {
  const snap = await get(ref(db, `links/${linkId}`));
  if (!snap.exists()) return null;
  return { id: linkId, ...snap.val() };
}

async function getLinksByTest(testId) {
  const snap = await get(ref(db, "links"));
  if (!snap.exists()) return [];
  return snapToArray(snap).filter(l => l.testId === testId);
}

async function updateLink(linkId, data) {
  await update(ref(db, `links/${linkId}`), data);
}

async function deleteLink(linkId) {
  await remove(ref(db, `links/${linkId}`));
}

async function incrementLinkUsage(linkId) {
  const snap = await get(ref(db, `links/${linkId}/usedAttempts`));
  const current = snap.exists() ? snap.val() : 0;
  await set(ref(db, `links/${linkId}/usedAttempts`), current + 1);
}

// ─── ATTEMPTS ─────────────────────────────────────────────────────────────────

async function createAttempt(data) {
  const newRef = push(ref(db, "attempts"));
  await set(newRef, {
    testId:    data.testId,
    linkId:    data.linkId,
    name:      data.name,
    surname:   data.surname,
    answers:   data.answers   || [],
    score:     data.score     ?? null,
    grade12:   data.grade12   ?? null,
    aiComment: data.aiComment ?? null,
    createdAt: nowTs()
  });
  return newRef.key;
}

async function updateAttempt(attemptId, data) {
  await update(ref(db, `attempts/${attemptId}`), data);
}

async function getAttemptsByTest(testId) {
  const snap = await get(ref(db, "attempts"));
  if (!snap.exists()) return [];
  return snapToArray(snap)
    .filter(a => a.testId === testId)
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}

async function checkDuplicateAttempt(testId, name, surname) {
  const snap = await get(ref(db, "attempts"));
  if (!snap.exists()) return false;
  return Object.values(snap.val()).some(a =>
    a.testId === testId &&
    a.name?.toLowerCase()    === name.toLowerCase() &&
    a.surname?.toLowerCase() === surname.toLowerCase()
  );
}

// ── Auth check ──
if (sessionStorage.getItem("qf_auth") === "1") {
  window.location.href = "index.html";
} else {
  document.getElementById("globalLoader").style.display = "none";
  document.getElementById("loginInput").focus();
}

function showError(msg) {
  document.getElementById("errorText").textContent = msg || "Невірний логін або пароль";
  document.getElementById("errorMsg").classList.add("show");
  ["loginInput","passInput"].forEach(id => {
    const el = document.getElementById(id);
    el.classList.add("error","shake");
    el.addEventListener("animationend", () => el.classList.remove("shake"), {once:true});
    el.addEventListener("input", () => {
      el.classList.remove("error");
      document.getElementById("errorMsg").classList.remove("show");
    }, {once:true});
  });
}

function setLoading(state) {
  const btn = document.getElementById("submitBtn");
  btn.disabled = state;
  document.getElementById("btnText").style.display = state ? "none" : "inline";
  const ex = btn.querySelector(".spinner");
  if (state && !ex) {
    const s = document.createElement("div");
    s.className = "spinner";
    btn.insertBefore(s, btn.querySelector("svg"));
  } else if (!state && ex) {
    ex.remove();
  }
}

window.doLogin = async () => {
  const login    = document.getElementById("loginInput").value.trim();
  const password = document.getElementById("passInput").value;
  if (!login || !password) { showError("Заповніть логін і пароль"); return; }
  setLoading(true);
  try {
    const ok = await checkLogin(login, password);
    if (ok) { sessionStorage.setItem("qf_auth","1"); window.location.href="index.html"; }
    else { showError("Невірний логін або пароль"); setLoading(false); }
  } catch(e) { showError("Помилка: " + e.message); setLoading(false); }
};

window.togglePass = () => {
  const input = document.getElementById("passInput");
  const icon  = document.getElementById("eyeIcon");
  const hidden = input.type === "password";
  input.type = hidden ? "text" : "password";
  icon.innerHTML = hidden
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
};
</script>
</body>
</html>
